# Base Alcohol

- type: reagent
  id: OE14DwarfBeer
  name: oe14-reagent-name-dwarfbeer
  parent: BaseAlcohol
  desc: oe14-reagent-desc-beer
  slipData:
    requiredSlipSpeed: 3.5
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: OE14dwarfbeer
  color: "#4b3620"
  boilingPoint: 78.2
  meltingPoint: -114.1
  metabolisms:
    Alcohol:
      effects:
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 10
        - !type:OrganType
          type: OE14Dwarf
          shouldHave: false
        damage:
          types:
            Poison: 1
      # dwarves take less toxin damage and heal a marginal amount of brute
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 10
        - !type:OrganType
          type: OE14Dwarf
        damage:
          types:
            Poison: 0.2
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 10
        - !type:OrganType
          type: OE14Dwarf
        damage:
          groups:
            Brute: -1
      - !type:ChemVomit
        probability: 0.04
        conditions:
        - !type:ReagentThreshold
          reagent: OE14DwarfBeer
          min: 8
        - !type:OrganType
          type: OE14Dwarf
          shouldHave: false
      - !type:Drunk
        boozePower: 2
  fizziness: 0.8
  pricePerUnit: 4


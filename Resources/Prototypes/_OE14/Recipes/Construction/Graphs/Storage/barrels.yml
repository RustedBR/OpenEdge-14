- type: constructionGraph
  id: OE14BaseBarrel
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: OE14BaseBarrel
          steps:
            - stackGroup: WoodenPlanks
              amount: 3
              doAfter: 3
    - node: OE14BaseBarrel
      entity: OE14BaseBarrel
      edges:
      - to: start
        steps:
        - tool: Prying
          doAfter: 2
        completed:
        - !type:SpawnPrototype
          prototype: OE14WoodenPlanks1
          amount: 3


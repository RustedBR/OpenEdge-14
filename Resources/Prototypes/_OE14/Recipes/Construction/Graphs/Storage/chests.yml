              prototype: OE14WoodenPlanks1
              amount: 2
            - !type:SpawnPrototype
              prototype: OE14IronBar1
              amount: 1
          conditions:
          - !type:Locked
            locked: false
          steps:
            - tool: Screwing
              doAfter: 1
            - tool: Prying
              doAfter: 3


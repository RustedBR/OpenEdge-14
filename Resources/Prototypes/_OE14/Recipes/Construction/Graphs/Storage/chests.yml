- type: constructionGraph
  id: OE14WoodenChest
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: OE14WoodenChest
          steps:
            - material: OE14WoodenPlanks
              amount: 5
              doAfter: 2
            - material: OE14IronBar
              amount: 1
              doAfter: 2

    - node: OE14WoodenChest
      entity: OE14WoodenChest

- type: constructionGraph
  id: OE14Seat
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: OE14ChairWooden
          steps:
            - material: OE14WoodenPlanks
              amount: 2
              doAfter: 2
        - to: OE14ChairWoodenBirch
          steps:
          - material: OE14BirchWoodenPlanks
            amount: 2
            doAfter: 2
    - node: OE14ChairWooden
      entity: OE14ChairWooden
      edges:
      - to: start
        steps:
        - tool: Prying
          doAfter: 2
        completed:
        - !type:SpawnPrototype
          prototype: OE14WoodenPlanks1
          amount: 2
    - node: OE14ChairWoodenBirch
      entity: OE14ChairWoodenBirch
      edges:
      - to: start
        steps:
        - tool: Prying
          doAfter: 2
        completed:
        - !type:SpawnPrototype
          prototype: OE14BirchWoodenPlanks1
          amount: 2


- type: constructionGraph
  id: OE14TableWooden
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: OE14TableWoodenFrame
          steps:
            - material: OE14WoodenPlanks
              amount: 1
              doAfter: 1
        - to: OE14TableWoodenBirchFrame
          steps:
          - material: OE14BirchWoodenPlanks
            amount: 1
            doAfter: 1

    - node: OE14TableWoodenFrame
      entity: OE14TableWoodenFrame
      edges:
        - to: start
          steps:
            - tool: Prying
              doAfter: 1
          completed:
            - !type:SpawnPrototype
              prototype: OE14WoodenPlanks1
              amount: 1
        - to: OE14TableWooden
          steps:
            - material: OE14WoodenPlanks
              amount: 1
              doAfter: 1

    - node: OE14TableWoodenBirchFrame
      entity: OE14TableWoodenBirchFrame
      edges:
      - to: start
        steps:
        - tool: Prying
          doAfter: 1
        completed:
        - !type:SpawnPrototype
          prototype: OE14BirchWoodenPlanks1
          amount: 1
      - to: OE14TableWoodenBirch
        steps:
        - material: OE14BirchWoodenPlanks
          amount: 1
          doAfter: 1

    - node: OE14TableWooden
      entity: OE14TableWooden
      edges:
        - to: OE14TableWoodenFrame
          steps:
            - tool: Prying
              doAfter: 1
          completed:
            - !type:SpawnPrototype
              prototype: OE14WoodenPlanks1
              amount: 1
        - to: OE14TableWoodenCounter
          steps:
            - material: OE14WoodenPlanks
              amount: 1
              doAfter: 1

    - node: OE14TableWoodenBirch
      entity: OE14TableWoodenBirch
      edges:
      - to: OE14TableWoodenBirchFrame
        steps:
        - tool: Prying
          doAfter: 1
        completed:
        - !type:SpawnPrototype
          prototype: OE14BirchWoodenPlanks1
          amount: 1
      - to: OE14TableWoodenBirchCounter
        steps:
        - material: OE14BirchWoodenPlanks
          amount: 1
          doAfter: 1

    - node: OE14TableWoodenCounter
      entity: OE14TableWoodenCounter
      edges:
        - to: OE14TableWooden
          steps:
            - tool: Prying
              doAfter: 1
          completed:
            - !type:SpawnPrototype
              prototype: OE14WoodenPlanks1
              amount: 1

    - node: OE14TableWoodenBirchCounter
      entity: OE14TableWoodenBirchCounter
      edges:

# Hide Crafting
- type: OE14Recipe
  id: OE14ScrapHideRecipe
  tag: OE14RecipeLeatherWorking
  category: LeatherWorking
  craftTime: 2
  requirements:
  - !type:ProtoIdResource
    protoId: OE14ScrapLeather
    count: 3 # 3x scraps (9u total)
  - !type:ProtoIdResource
    protoId: OE14String
    count: 1 # 5u cloth
  result: OE14Leather1
  # Cost: (15×1.2) + (5×0.3) = 18 + 1.5 = 19.5 copper coins

- type: OE14Recipe
  id: OE14ThinToRegularHideRecipe
  tag: OE14RecipeLeatherWorking
  category: LeatherWorking
  craftTime: 2
  requirements:
  - !type:StackResource
    stack: OE14ThinLeather # 5u
    count: 2 # 10u OE14Leather
  - !type:ProtoIdResource
    protoId: OE14String
    count: 1 # 5u cloth
  result: OE14Leather1 # 1x hide (10u)
  # Cost: (10×1.2) + (5×0.3) = 12 + 1.5 = 13.5 copper coins

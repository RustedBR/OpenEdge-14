
# Splitting: Applying magical dispel to split precursor into essences.

- type: reaction
  id: OE14BloodFlowerSplitting
  requiredMixerCategories:
  - OE14MagicSplitting
  reactants:
    OE14BloodFlowerSap:
      amount: 1
  products:
    OE14EssenceLife: 0.5
    OE14EssenceWater: 0.5


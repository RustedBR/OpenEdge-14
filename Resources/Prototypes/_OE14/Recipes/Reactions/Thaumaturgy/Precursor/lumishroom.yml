
# Splitting: Applying magical dispel to split precursor into essences.

- type: reaction
  id: OE14LumiMushroomSplitting
  requiredMixerCategories:
  - OE14MagicSplitting
  reactants:
    OE14LumiMushroom:
      amount: 1
  products:
    OE14EssenceLight: 0.5
    OE14EssenceEarth: 0.5


# Simple recipes made from T0 and T1 essences and water
# T1
# The result is always 75% empty solution

- type: reaction
  id: OE14WaterBrewingDamageBrute
  minTemp: 500
  priority: 1
  reactants:
    OE14EssenceLife:
      amount: 2
    OE14EssenceChaos:
      amount: 1
    Water:
      amount: 1
  products:
    OE14SideEffectEmpty: 2
    OE14SideEffectEmoteCough: 1
    OE14DamageEffectDamageBrute: 1
  effects:
  - !type:OE14AffectSolutionTemperature
    addTemperature: -150


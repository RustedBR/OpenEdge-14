- type: species
  id: OE14Tiefling
  name: oe14-species-name-tiefling
  roundStart: true
  prototype: OE14MobTiefling
  sprites: OE14MobTieflingSprites
  markingLimits: OE14MobTieflingMarkingLimits
  dollPrototype: OE14MobTieflingDummy
  skinColoration: OE14TieflingHues
  maleFirstNames: OE14_Names_Tiefling_Male_First
  femaleFirstNames: OE14_Names_Tiefling_Female_First
  lastNames: OE14_Names_Tiefling_Last
  minAge: 18
  maxAge: 120
  youngAge: 50
  oldAge: 80

# The lack of a layer means that
# this person cannot have round-start anything
# applied to that layer. It has to instead
# be defined as a 'custom base layer'
# in either the mob's starting marking prototype,
# or it has to be added in C#.
- type: speciesBaseSprites
  id: OE14MobTieflingSprites
  sprites:
    Head: OE14MobTieflingHead
    HeadTop: OE14MobTieflingAnyMarking
    Hair: OE14MobTieflingAnyMarking
    FacialHair: OE14MobTieflingAnyMarking
    Snout: OE14MobTieflingMarkingMatchSkin
    Tail: OE14MobTieflingMarkingMatchSkin
    Chest: OE14MobTieflingTorso
    Eyes: OE14MobTieflingEyes
    LArm: OE14MobTieflingLArm
    RArm: OE14MobTieflingRArm
    LHand: OE14MobTieflingLHand
    RHand: OE14MobTieflingRHand
    LLeg: OE14MobTieflingLLeg
    RLeg: OE14MobTieflingRLeg
    LFoot: OE14MobTieflingLFoot
    RFoot: OE14MobTieflingRFoot

- type: markingPoints
  id: OE14MobTieflingMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ OE14TieflingTail ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ OE14TieflingHorns ]
    Chest:
      points: 1
      required: false
    Legs:
      points: 2
      required: false
    Arms:
      points: 2
      required: false


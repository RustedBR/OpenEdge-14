
- type: ambientLoop
  id: OpenWinds
  sound:
    params:
      volume: -6
    collection: OE14LoopWinds
  rules: OpenWinds

- type: ambientLoop
  id: Water
  sound:
    params:
      volume: 18
    collection: OE14LoopWater
  rules: NearWater

- type: ambientLoop
  id: Lurker
  sound:
    params:
      volume: -12
    path: /Audio/_OE14/Effects/Lurker/ambient.ogg
  rules: NearLurker

- type: ambientLoop
  id: Cave
  sound:
    params:
      volume: 2
    collection: OE14LoopCave
  rules: CaveFloor

- type: ambientLoop
  id: NightGrass
  sound:
    params:
      volume: 2
    collection: OE14LoopNightGrass
  rules: GrassNight

- type: ambientLoop
  id: ForestDay
  sound:
    params:
      volume: 2
    collection: OE14LoopForestDay
  rules: DayForest

# Sound collections
- type: soundCollection
  id: OE14LoopWinds
  files:
    - /Audio/_OE14/Ambience/Loops/winds.ogg

- type: soundCollection
  id: OE14LoopWater
  files:
    - /Audio/_OE14/Ambience/Loops/water.ogg

- type: soundCollection
  id: OE14LoopCave
  files:
    - /Audio/_OE14/Ambience/Loops/cave.ogg

- type: soundCollection
  id: OE14LoopNightGrass
  files:
    - /Audio/_OE14/Ambience/Loops/ambiforest_night.ogg

- type: soundCollection
  id: OE14LoopForestDay
  files:
    - /Audio/_OE14/Ambience/Loops/ambiforest_day.ogg

# Rules
- type: rules
  id: OpenWinds
  rules:
    - !type:NearbyTilesPercentRule
      ignoreAnchored: true
      percent: 0.5
      tiles:
      - OE14FloorGrass
      - OE14FloorGrassLight
      - OE14FloorGrassTall
      - OE14FloorDirt
      - OE14FloorSand
      range: 5

- type: rules
  id: GrassNight
  rules:
    - !type:OE14IsNight
    - !type:NearbyTilesPercentRule
      ignoreAnchored: true
      percent: 0.5
      tiles:
      - OE14FloorGrass
      - OE14FloorGrassLight
      - OE14FloorGrassTall
      range: 5

- type: rules
  id: DayForest
  rules:
    - !type:OE14IsNight
      inverted: true
    - !type:NearbyEntitiesRule
      count: 3
      whitelist:
        tags:
          - OE14AmbientForest

- type: rules
  id: CaveFloor
  rules:
    - !type:NearbyTilesPercentRule
      ignoreAnchored: true
      percent: 0.5
      tiles:
      - OE14FloorBase
      range: 5

- type: rules
  id: NearWater
  rules:
    - !type:NearbyEntitiesRule
      count: 5
      whitelist:
        tags:
          - OE14AmbientWater
      range: 4

- type: rules
  id: NearLurker
  rules:
    - !type:NearbyEntitiesRule
      count: 1
      whitelist:
        tags:
          - OE14AmbientLurker
      range: 6


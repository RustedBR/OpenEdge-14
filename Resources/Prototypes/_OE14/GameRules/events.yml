- type: entity
  parent: OE14BaseGameRule
  id: OE14BaseStationEventShortDelay
  abstract: true
  components:
  - type: GameRule
    delay:
      min:  10
      max:  20

- type: entity
  parent: OE14BaseGameRule
  id: OE14BaseStationEventLongDelay
  abstract: true
  components:
  - type: GameRule
    delay:
      min:  40
      max:  60

- type: entityTable
  id: OE14BasicCalmEventsTable
  table: !type:AllSelector
    children:
    - id: OE14Storm

- type: entity
  parent: OE14BaseStationEventLongDelay
  id: OE14Storm
  components:
  - type: StationEvent
    startAnnouncement: oe14-event-announcement-storm
    startAudio:
      collection: OE14LightningFar
    earliestStart: 45
    minimumPlayers: 10
    duration: 180
    maxDuration: 600
  - type: OE14WeatherRule
    weather: OE14Storm


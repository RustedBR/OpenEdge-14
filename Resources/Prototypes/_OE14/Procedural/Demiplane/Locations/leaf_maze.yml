- type: oe14Location
  id: LeafMaze
  name: oe14-demiplane-location-leaf-maze
  icon:
    sprite: _OE14/Interface/Misc/demiplane_locations.rsi
    state: leaf_maze
  levels:
    min: 1
    max: 10
  locationConfig: OE14LeafMaze
  tags:
  - OE14DemiplaneHerbals
  - OE14DemiplaneOpenSky
  - OE14DemiplanePeacefulAnimals
  - OE14DemiplaneWater
  - OE14DemiplaneAnimalsSwamp
  components:
  - type: MapLight
    ambientLightColor: "#BFEEFFFF"
  - type: Biome
    template: OE14CavesIndestructibleFill
  - type: SunShadow
  - type: SunShadowCycle
  - type: Roof
  - type: OE14CloudShadows

- type: dungeonConfig
  id: OE14LeafMaze
  layers:
  # Masks
  - !type:NoiseDistanceDunGen
    size: 90, 90
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.9
    layers:
    - tile: OE14FloorSand
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  - !type:NoiseDistanceDunGen
    size: 60, 60
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.5
    layers:
    - tile: OE14FloorGrass
      threshold: 0.50
      noise:
        frequency: 0.030
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  # Biomes
  - !type:OE14BiomeDunGen
    biomeTemplate: OE14LeafMaze
    tileMask:
    - OE14FloorSand
  - !type:OE14BiomeDunGen
    biomeTemplate: OE14Grassland
    tileMask:
    - OE14FloorGrass


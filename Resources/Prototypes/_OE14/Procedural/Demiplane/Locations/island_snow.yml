- type: oe14Location
  id: SnowIsland
  name: oe14-demiplane-location-snow-island
  icon:
    sprite: _OE14/Interface/Misc/demiplane_locations.rsi
    state: snow_island
  levels:
    min: 2
    max: 10
  locationConfig: OE14SnowIsland
  tags:
  - OE14DemiplaneOres
  - OE14DemiplaneOpenSky
  - OE14DemiplanePeacefulAnimals
  - OE14DemiplaneCold
  components:
  - type: MapLight
    ambientLightColor: "#BFEEFFFF"
  - type: OE14CloudShadows
  - type: Biome
    template: OE14IceOceanFill
  - type: SunShadow
  - type: SunShadowCycle
  - type: Roof

- type: dungeonConfig

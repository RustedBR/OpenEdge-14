- type: oe14Location
  id: IceCaves
  name: oe14-demiplane-location-ice-cave
  icon:
    sprite: _OE14/Interface/Misc/demiplane_locations.rsi
    state: ice_caves
  levels:
    min: 2
    max: 10
  locationConfig: OE14IceCaves
  tags:
  - OE14DemiplaneOres
  - OE14DemiplaneUnderground
  - OE14DemiplaneCold
  components:
  - type: Biome
    template: OE14IceChasmFill
  - type: Roof
  - type: OE14SetGridRooved
  - type: SunShadow
  - type: SunShadowCycle
  - type: MapLight
    ambientLightColor: "#BFEEFFFF"

- type: dungeonConfig
  id: OE14IceCaves
  layers:
    # Masks
  - !type:NoiseDistanceDunGen
    size: 90, 90
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.9
    layers:
    - tile: OE14FloorSand
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  - !type:NoiseDistanceDunGen
    size: 60, 60
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.5
    layers:
    - tile: OE14FloorGrass
      threshold: 0.50
      noise:
        frequency: 0.030
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  # Biomes
  - !type:OE14BiomeDunGen
    biomeTemplate: OE14IceCavesGeneric
    tileMask:
    - OE14FloorSand
  - !type:OE14BiomeDunGen
    biomeTemplate: OE14IceCavesFloor
    tileMask:
    - OE14FloorGrass


- type: oe14Location
  id: T1Wastelands
  name: oe14-demiplane-location-wastelands
  icon:
    sprite: _OE14/Interface/Misc/demiplane_locations.rsi
    state: wastelands
  levels:
    min: 3
    max: 10
  locationConfig: OE14WastelandsIsland
  tags:
  - OE14DemiplaneOres
  - OE14DemiplaneOpenSky
  components:
  - type: MapLight
    ambientLightColor: "#BFEEFFFF"
  - type: OE14CloudShadows
  - type: Biome
    template: OE14ChasmFill
  - type: SunShadow
  - type: SunShadowCycle
  - type: Roof

- type: dungeonConfig
  id: OE14WastelandsIsland
  layers:
  # Masks
  - !type:NoiseDistanceDunGen
    size: 120, 120
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.7
    layers:
    - tile: OE14FloorSand
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  - !type:NoiseDistanceDunGen
    size: 115, 115
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.6
    layers:
    - tile: OE14FloorGrass
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  - !type:NoiseDistanceDunGen
    size: 90, 90
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.5
    layers:
    - tile: OE14FloorBase
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  # Biomes
  - !type:BiomeDunGen
    biomeTemplate: OE14CavesGeneric
    tileMask:
    - OE14FloorBase
  - !type:BiomeDunGen
    biomeTemplate: OE14Wastelands
    tileMask:
    - OE14FloorGrass
  - !type:BiomeDunGen
    biomeTemplate: OE14Wastelands
    tileMask:
    - OE14FloorSand

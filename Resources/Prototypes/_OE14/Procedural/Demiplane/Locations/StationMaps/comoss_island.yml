- type: oe14Location
  id: ComossIsland
  icon:
    sprite: _OE14/Interface/Misc/demiplane_locations.rsi
    state: caves
  locationConfig: OE14ComossIsland
  generationProb: 0 #Special location for map only
  tags:
  - OE14DemiplaneOres
  - OE14DemiplaneHerbals
  - OE14DemiplaneOpenSky
  - OE14DemiplanePeacefulAnimals
  components:
  - type: MapLight
    ambientLightColor: "#BFEEFFFF"
  - type: OE14CloudShadows
  - type: Biome
    template: OE14SandOceanFill
  - type: SunShadow
  - type: SunShadowCycle
  - type: Roof

- type: dungeonConfig
  id: OE14ComossIsland
  layers:
  # Masks
  - !type:NoiseDistanceDunGen
    size: 220, 220
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.8
    layers:
    - tile: OE14FloorSand
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  - !type:NoiseDistanceDunGen
    size: 215, 215
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.7
    layers:
    - tile: OE14FloorGrass
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  - !type:NoiseDistanceDunGen
    size: 140, 140
    distanceConfig: !type:DunGenEuclideanSquaredDistance
      blendWeight: 0.6
    layers:
    - tile: OE14FloorBase
      threshold: 0.50
      noise:
        frequency: 0.010
        noiseType: OpenSimplex2
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.5
  # Biomes
  - !type:OE14BiomeDunGen
    biomeTemplate: OE14CavesGeneric
    tileMask:
    - OE14FloorBase
  - !type:OE14BiomeDunGen
    biomeTemplate: OE14GrasslandTestResult
    tileMask:
    - OE14FloorGrass
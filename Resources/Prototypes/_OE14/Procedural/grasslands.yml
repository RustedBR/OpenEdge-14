# Use https://auburn.github.io/FastNoiseLite/ to Preview
# Базовый биом лугов.

- type: biomeTemplate
  id: OE14GrassFill
  layers:
    - !type:BiomeTileLayer
      threshold: -1.0
      tile: OE14FloorGrass
    - !type:BiomeTileLayer
      tile: OE14FloorGrassLight
      threshold: 0
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
    - !type:BiomeTileLayer
      tile: OE14FloorGrassTall
      threshold: 0.45
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120

- type: biomeTemplate
  id: OE14Grassland
  layers:
    - !type:BiomeMetaLayer
      template: OE14GrassFill
    - !type:BiomeDecalLayer #Rock decal
      allowedTiles:
      - OE14FloorGrass
      - OE14FloorGrassLight
      - OE14FloorGrassTall
      threshold: 0.6
      divisions: 1
      noise:
        seed: 18
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.11
        octaves: 3
        lacunarity: 1.7
        gain: 0.8
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - OE14FloraRock01
        - OE14FloraRock02
        - OE14FloraRock03
        - OE14FloraRock04
        - OE14FloraRock05
    - !type:BiomeDecalLayer #Grass decal
      allowedTiles:
      - OE14FloorGrass
      - OE14FloorGrassLight
      - OE14FloorGrassTall
      threshold: 0
      divisions: 1
      noise:
        seed: 12
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - OE14FloraGrass1
        - OE14FloraGrass2
        - OE14FloraGrass3
        - OE14FloraGrass4
        - OE14FloraGrass5
        - OE14FloraGrass6
        - OE14FloraGrass7
        - OE14FloraGrass8
        - OE14FloraGrass9
        - OE14FloraGrass10
        - OE14FloraGrass11
        - OE14FloraGrass12
        - OE14FloraGrass13
        - OE14FloraGrass14
    - !type:BiomeDecalLayer #Bush decal
      allowedTiles:
      - OE14FloorGrass
      - OE14FloorGrassLight
      - OE14FloorGrassTall
      threshold: 0.35
      divisions: 1
      noise:
        seed: 12
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - OE14GrassBushes1
        - OE14GrassBushes2
        - OE14GrassBushes3
        - OE14GrassBushes4
        - OE14GrassBushes5
        - OE14GrassBushes6
        - OE14GrassBushes7
        - OE14GrassBushes8
        - OE14GrassBushes9
    - !type:BiomeEntityLayer # Tall grass!
      threshold: 0.3
      noise:
        seed: 23
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      allowedTiles:
        - OE14FloorGrassTall
      entities:
        - OE14RandomBushOffsetSpawner
    - !type:BiomeEntityLayer # Rare Trees
      threshold: 0.8
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 2
      allowedTiles:
        - OE14FloorGrass
        - OE14FloorGrassLight
        - OE14FloorGrassTall
      entities:
        - OE14FloraTreeBirchLarge
        - OE14FloraTreeBirchSmall
        - OE14FloraTreeBirchMedium
        - OE14FloraTreeSpruceSmall
        - OE14FloraTreeSpruceSmall
        - OE14FloraTreeSpruceMedium
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreenLarge
        - OE14FloraTreeDead
        - OE14FloraTreeDeadSmall
    - !type:BiomeEntityLayer # More Rocks
      threshold: 0.7
      noise:
        seed: 18
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 3
      allowedTiles:
        - OE14FloorGrass
        - OE14FloorGrassLight
        - OE14FloorGrassTall
      entities:
        - OE14RockSmall
    - !type:BiomeEntityLayer # More Rocks
      threshold: 0.8
      noise:
        seed: 27
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 2
      allowedTiles:
        - OE14FloorGrass
        - OE14FloorGrassLight
        - OE14FloorGrassTall
      entities:
        - OE14RockBig
        - OE14RockBigMoss

# Подбиомы лугов

- type: biomeTemplate
  id: OE14GrasslandForest # Лес
  layers:
    - !type:BiomeMetaLayer
      template: OE14Grassland
    - !type:BiomeEntityLayer # More Trees
      threshold: 0.2
      noise:
        seed: 4
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 2
      allowedTiles:
        - OE14FloorGrass
        - OE14FloorGrassLight
        - OE14FloorGrassTall
      entities:
        - OE14FloraTreeBirchLarge
        - OE14FloraTreeBirchSmall
        - OE14FloraTreeBirchMedium
        - OE14FloraTreeSpruceSmall
        - OE14FloraTreeSpruceSmall
        - OE14FloraTreeSpruceMedium
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreen
        - OE14FloraTreeGreenLarge
        - OE14FloraTreeDead
        - OE14FloraTreeDeadSmall

- type: biomeTemplate
  id: OE14GrasslandHills # Холмы
  layers:
    - !type:BiomeMetaLayer
      template: OE14GrasslandForest
    - !type:BiomeTileLayer
      tile: OE14FloorBase
      invert: true
      threshold: 0.5
      noise:
        seed: 6
        noiseType: OpenSimplex2
        frequency: 0.03
        lacunarity: 2
        fractalType: Ridged
        octaves: 1
        cellularDistanceFunction: Euclidean
        cellularReturnType: Distance
        cellularJitterModifier: 0.7
        domainWarpType: OpenSimplex2Reduced
        domainWarpAmp: 285
    - !type:BiomeEntityLayer # Walls
      allowedTiles:
        - OE14FloorBase
      threshold: -1.0
      entities:
        - OE14WallDirt

- type: biomeTemplate
  id: OE14GrasslandTestResult
  layers:
    - !type:BiomeMetaLayer
      template: OE14Grassland
    - !type:BiomeMetaLayer
      template: OE14GrasslandForest
      threshold: 0.2
      noise:
        seed: 18
        frequency: 0.02
        fractalType: None
    - !type:BiomeMetaLayer
      template: OE14GrasslandHills
      threshold: 0.4
      noise:
        seed: 14
        frequency: 0.02
        fractalType: None
    # Lakes start
    - !type:BiomeTileLayer
      tile: OE14FloorSand
      threshold: 0.55
      noise:
        seed: 14
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 0.01
        domainWarpType: OpenSimplex2
        domainWarpAmp: 150
    - !type:BiomeTileLayer
      tile: OE14FloorDirt
      threshold: 0.68
      noise:
        seed: 14
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 0.01
        domainWarpType: OpenSimplex2
        domainWarpAmp: 150
    - !type:BiomeEntityLayer
      allowedTiles:
        - OE14FloorDirt
        - OE14FloorSand

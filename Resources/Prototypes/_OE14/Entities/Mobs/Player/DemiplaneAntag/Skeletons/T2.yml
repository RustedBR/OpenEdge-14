- type: entity
  id: OE14MobUndeadSkeletonWizardT2
  parent: OE14MobUndeadSkeletonDemiplaneT2
  categories: [ ForkFiltered ]
  suffix: Wizard T2
  components:
  - type: Loadout
    prototypes:
    - OE14MobSkeletonWizardT2
  - type: OE14MagicEnergyContainer
    magicAlert: OE14MagicEnergy
    maxEnergy: 200
    energy: 200
    unsafeSupport: true
  - type: OE14MagicEnergyDraw
    energy: 1
    delay: 5
  - type: PassiveDamage
    allowedStates:
    - Alive
    damage:
      types:
        OE14ManaDepletion: -0.1
  - type: OE14SkillStorage
    skillPoints:
      Memory:
        max: 4
    freeLearnedSkills:
    #- SwordMastery
    - HydrosophistryT1
    - HydrosophistryT2
    - MetamagicT1
    - MetamagicT2
    - PyrokineticT1
    - OE14ActionSpellManaConsume
    - OE14ActionSpellManaGift
    - OE14ActionSpellManaConsumeElf
    - OE14ActionSpellManaGiftElf
    - OE14ActionSpellMagicSplitting
  - type: OE14SpellStorage
    grantAccessToSelf: true
    spells:
    - OE14ActionSpellCallBoneHound


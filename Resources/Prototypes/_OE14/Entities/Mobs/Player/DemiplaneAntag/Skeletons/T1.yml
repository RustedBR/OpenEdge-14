- type: entity
  id: OE14SpawnPointGhostDemiplaneSkeletonT1
  name: ghost role spawn point
  description: A ghost role for a bloodthirsty and cunning skeleton.
  suffix: skeleton random T1
  categories: [ ForkFiltered ]
  parent: MarkerBase
  components:
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - !type:GroupSelector
        weight: 15
        children:
        - id: SpawnPointGhostDemiplaneSkeletonArcherT1
      - !type:GroupSelector
        weight: 20
        children:
        - id: SpawnPointGhostDemiplaneSkeletonHalberdT1
      - !type:GroupSelector
        weight: 60
        children:
        - id: SpawnPointGhostDemiplaneSkeletonSwordT1
        - id: SpawnPointGhostDemiplaneSkeletonDodgerT1
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: _OE14/Mobs/Species/Skeleton/parts.rsi
        state: full

- type: entity
  id: SpawnPointGhostDemiplaneSkeletonHalberdT1
  name: ghost role spawn point
  description: A ghost role for a bloodthirsty and cunning skeleton.
  suffix: skeleton Halebard T1
  categories: [ ForkFiltered ]
  parent: MarkerBase
  components:
  - type: GhostRole
    name: oe14-ghost-role-information-name-skeleton
    allowMovement: true
    description: oe14-ghost-role-information-description-skeleton
    rules: oe14-ghost-role-information-rules-demiplane
    mindRoles:
    - OE14MindRoleDemiplaneAntag
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: OE14MobUndeadSkeletonHalberdT1
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: _OE14/Mobs/Species/Skeleton/parts.rsi
        state: full


- type: entity
  id: OE14MobUndeadSkeletonDemiplaneT1
  parent: OE14BaseMobSkeleton
  name: skeleton
  abstract: true
  components:
  - type: OE14NightVision
  - type: NpcFactionMember
    factions:
    - OE14Monster

- type: entity
  id: OE14MobUndeadSkeletonHalberdT1
  parent: OE14MobUndeadSkeletonDemiplaneT1
  categories: [ ForkFiltered ]
  suffix: Halebard T1
  components:
  - type: Loadout
    prototypes:
    - OE14MobSkeletonHalberdT1
  - type: OE14SkillStorage
    skillPoints:
      Memory:
        max: 0 
    #freeLearnedSkills:
    #- SwordMastery
  - type: OE14SpellStorage
    grantAccessToSelf: true
    spells:
    - OE14ActionSpellKick


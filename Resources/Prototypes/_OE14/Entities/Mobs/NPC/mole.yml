- type: entity
  id: OE14MobMonsterMole
  parent: OE14SimpleMobBase
  name: predatory mole
  description: Hunts in the dark and loves the taste of meat and blood in its mouth.
  categories: [ ForkFiltered ]
  components:
  - type: HTN
    rootTask:
      task: OE14MonsterCompound
    blackboard:
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        16
      AggroVisionRadius: !type:Single
        12
  - type: NpcFactionMember
    factions:
    - OE14Monster
  - type: NPCUseActionOnTarget
    actionId: OE14ActionMoleSpellSubterraneanLeap
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      sprite: _OE14/Mobs/Monster/mole.rsi
      state: live
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ReplacementAccent
    accent: xeno
  - type: Appearance
  - type: Body
    prototype: Animal
  - type: MobThresholds
    thresholds:
      0: Alive
      60: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      40: 0.8
  - type: Stamina
    critThreshold: 200
  - type: CombatMode
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Slash: 3
        Piercing: 3
        Structural: 3
  - type: MovementSpeedModifier
    baseWalkSpeed: 4
    baseSprintSpeed: 4
  - type: DamageStateVisuals
    states:
      Alive:
        Base: live
      Dead:
        Base: dead
  - type: Butcherable
    spawned:
    - id: OE14FoodMeatMonster
      amount: 3
    - id: OE14FoodMeatPig
      amount: 1
      prob: 0.3
    - id: OE14FoodMeatMonsterLeg
      amount: 1
      prob: 0.6
    - id: OE14RuggedLeather1
      amount: 1
      prob: 0.2
    - id: OE14Leather1
      amount: 1
      maxAmount: 4
    - id: OE14ScrapLeather
      amount: 1
      maxAmount: 2
      prob: 0.5
    - id: OE14CheapFur
      amount: 1
      prob: 0.25
    - id: OE14Bone1
      amount: 2
      maxAmount: 3
  - type: Bloodstream
    bloodMaxVolume: 200
    bloodReagent: OE14BloodMonster
  - type: Grammar
    attributes:
      gender: epicene
  - type: OE14MagicEnergyContainer
    magicAlert: OE14MagicEnergy
    maxEnergy: 100
    energy: 100
  - type: OE14MagicEnergyDraw
    energy: 2
    delay: 4
  - type: Tag
    tags:
      - FootstepSound
      - OE14Mosquito

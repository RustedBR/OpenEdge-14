- type: entity
  id: OE14XenoTurret
  parent: WeaponTurretXeno
  categories: [ ForkFiltered ]
  components:
  - type: NpcFactionMember
    factions:
      - OE14Monster
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 50
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              path: /Audio/Effects/gib1.ogg
          - !type:SpawnEntitiesBehavior
            spawn:
              OE14FoodEgg:
                min: 1
                max: 2
          - !type:SpawnEntitiesBehavior
            spawn:
              OE14String:
                min: 1
                max: 2


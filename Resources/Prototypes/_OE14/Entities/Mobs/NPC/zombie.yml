- type: entity
  id: OE14MobUndeadZombie
  parent: OE14BaseMobZombie
  name: walking dead
  description: A reanimated rotting body of a dead man wanting to devour the living.
  categories: [ ForkFiltered ]
  components:
  - type: HTN
    rootTask:
      task: OE14ZombieCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember

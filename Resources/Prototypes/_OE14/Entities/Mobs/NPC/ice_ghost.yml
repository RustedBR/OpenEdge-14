- type: entity
  id: OE14MobIceSpectre
  parent:
  - BaseMob
  - MobCombat
  categories: [ ForkFiltered ]
  name: icy spectre
  description: The unburied soul of frozen adventurers. Her rage against the world robs her of her reason.
  components:
  - type: HTN
    rootTask:
      task: OE14MonsterCompound
    blackboard:
      NavSmash: !type:Bool
        true
      VisionRadius: !type:Single
        16
      AggroVisionRadius: !type:Single
        12
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 5
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
        - Opaque
  - type: NPCUseActionOnTarget
    actionId: OE14ActionSpellIceShardsGhost
  - type: NpcFactionMember
    factions:
    - OE14Monster
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Cold: 8
  - type: MovementIgnoreGravity
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 2
    friction: 0.5
    acceleration: 3
  - type: Sprite
    sprite: _OE14/Mobs/Monster/ice_spectre.rsi
    layers:
    - state: base
      shader: unshaded
    drawdepth: Mobs
  - type: Damageable
    damageContainer: OE14Biological
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: OE14MagicEnergyContainer
    magicAlert: OE14MagicEnergy
    maxEnergy: 100
    energy: 100
  - type: OE14MagicEnergyDraw
    energy: 2
    delay: 4
  - type: AmbientSound
    volume: -1
    range: 12
    sound:
      path: /Audio/_OE14/Animals/ghost_ambi.ogg

- type: entity
  parent: OE14ActionSpellIceShards
  id: OE14ActionSpellIceShardsGhost
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: -2.0
  - type: Action
    useDelay: 1
  - type: TargetAction
    checkCanAccess: true
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent


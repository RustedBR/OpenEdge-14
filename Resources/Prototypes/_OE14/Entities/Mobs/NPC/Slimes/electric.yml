- type: entity
  id: OE14MobSlimeElectric
  parent: OE14MobSlimeBase
  name: electric slime
  components:
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: base
      color: "#f7f00c"
      shader: unshaded
  - type: PointLight
    color: "#f7f00c"
    energy: 2
    radius: 1.8
  - type: SolutionContainerManager
    solutions:
      slime:
        maxVol: 50
        reagents:
        - ReagentId: OE14ChromiumSlime
          Quantity: 20
        - ReagentId: OE14EssenceEnergia
          Quantity: 30
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 3
        Shock: 3
  - type: OE14SpellEffectOnHit
    effects:
    - !type:OE14SpellApplyEntityEffect
      effects:
      - !type:Jitter
      - !type:OE14StaminaChange
        staminaDelta: -10
    - !type:OE14SpellSpawnEntityOnTarget
      spawns:
      - OE14ElectrifiedEffect
  - type: Damageable
    damageModifierSet: OE14SlimeElectric
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:SpillBehavior
        solution: slime
      - !type:SpawnEntitiesBehavior
        spawn:
            OE14AreaEntityEffectSlimeShock:
              min: 1
              max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:GroupSelector
        children:
        - !type:GroupSelector
          children:
          - id: OE14OreCopper1
          - id: OE14OreIron1
          - id: OE14ScrapCopper
          - id: OE14ScrapIron
          - id: OE14CopperCoin1
            weight: 3

- type: entity
  id: OE14AreaEntityEffectSlimeShock
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    color: "#f7f00c"
  - type: Sprite
    noRot: true
    drawdepth: BelowFloor
    sprite: _OE14/Effects/Magic/area_impact.rsi
    layers:
    - state: area_impact_out
      color: "#f7f00c"
      scale: 2, 2
      shader: unshaded
  - type: TimedDespawn
    lifetime: 0.2
  - type: OE14AreaEntityEffect
    range: 2
    whitelist:
      components:
      - Damageable
    effects:
    - !type:OE14SpellSpawnEntityOnTarget
      spawns:
      - OE14ElectrifiedEffect
    - !type:OE14SpellApplyEntityEffect
      effects:
      - !type:Jitter
      - !type:OE14StaminaChange
        staminaDelta: -30

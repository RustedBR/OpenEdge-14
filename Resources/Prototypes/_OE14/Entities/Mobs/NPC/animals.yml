  #- type: NPCUseActionOnTarget # TODO: add support for non-target actions
  #  actionId: OE14ActionBearSpellSprint
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      sprite: _OE14/Mobs/Animals/bear.rsi

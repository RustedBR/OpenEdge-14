    - id: OE14FoodMeatBoar # TODO
      amount: 5
    - id: OE14RuggedLeather1
      amount: 2
      maxAmount: 5
    - id: OE14ScrapLeather
      amount: 2
      maxAmount: 6
      prob: 0.5
    - id: OE14GoodFur
      amount: 1
    - id: OE14Bone1
      amount: 8
      maxAmount: 10
  - type: Bloodstream
    bloodMaxVolume: 350
    bloodReagent: OE14BloodAnimal
  - type: Puller
    needsHands: false
  - type: Tag
    tags:
    - FootstepSound
  - type: Grammar
    attributes:
      gender: epicene
  - type: ReplacementAccent
    accent: genericAggressive
  - type: Vocal
    sounds:
      Unsexed: OE14Bear
  - type: SpamEmitSound
    minInterval: 20
    maxInterval: 40
    sound:
      collection: OE14Bear
      params:
        volume: -2
        variation: 0.125
  - type: SoundWhileAlive

- type: entity
  id: OE14MobSnail
  parent: OE14SimpleMobBase
  name: snail
  description: A small and slow snail. It seems that any touch could crush it.
  categories: [ ForkFiltered ]
  components:
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: oe14-ghost-role-information-name-snail
    description: oe14-ghost-role-information-description-snail
    rules: ghost-role-information-freeagent-rules
    mindRoles:
    - MindRoleGhostRoleFreeAgentHarmless
  - type: GhostTakeoverAvailable
  - type: HTN
    constantlyReplan: false
    rootTask:
      task: MouseCompound
  - type: NpcFactionMember
    factions:
      - OE14PeacefulAnimals
  - type: Sprite
    drawdepth: SmallMobs
    layers:
    - sprite: _OE14/Mobs/Animals/snail.rsi
      state: live
  - type: Item
    size: Tiny
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.1
        density: 20
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      10: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3
  - type: Speech
    speechVerb: SmallMob
  - type: ReplacementAccent
    accent: mouse
  - type: Food
  - type: Thirst
    baseDecayRate: 0.01
  - type: Hunger
    baseDecayRate: 0.01
  - type: Body
    prototype: null
  - type: Respirator
    minSaturation: 5.0
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 3
  - type: Tag
    tags:
    - Meat
  - type: CombatMode
    combatToggleAction: ActionCombatModeToggleOff
  - type: Bloodstream
    bloodMaxVolume: 10
    bloodReagent: OE14BloodAnimal
  - type: CanEscapeInventory
  - type: BadFood
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Mouse_burning
  - type: NoSlip
  - type: Slippery
  - type: StepTrigger
    requiredTriggeredSpeed: 1
  - type: TriggerOnStepTrigger
  - type: RandomChanceTriggerCondition
    successChance: 0.3
  - type: GibOnTrigger
  - type: ProtectedFromStepTriggers
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:GibBehavior
        recursive: false
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          OE14FoodSnailShell:
            min: 1
            max: 1
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 3
      behaviors:
      - !type:GibBehavior
        recursive: false
    - trigger:
        !type:DamageTypeTrigger
        damageType: Slash
        damage: 5
      behaviors:
      - !type:GibBehavior
        recursive: false
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 9
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          OE14Ash1:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact

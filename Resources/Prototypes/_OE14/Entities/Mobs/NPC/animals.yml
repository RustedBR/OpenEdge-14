  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        density: 350
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  - type: CombatMode
  - type: MeleeWeapon
    angle: 0
    attackRate: 0.8
    animation: WeaponArcClaw
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Structural: 60
        Piercing: 5
        Slash: 6
        Blunt: 5
    bluntStaminaDamageFactor: 2.0
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3

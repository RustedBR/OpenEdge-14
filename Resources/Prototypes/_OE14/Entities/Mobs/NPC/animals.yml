- type: entity
  id: OE14MobBoar
  parent: OE14MobPig
  name: boar
  description: A distant relative of pigs, same pros, but unlike its peaceful relatives, will definitely try to pick you up on its fangs if you show aggression towards it.
  categories: [ ForkFiltered ]
  components:
  - type: HTN
    rootTask:
      task: RuminantHostileCompound
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      sprite: _OE14/Mobs/Animals/boar.rsi
      state: live
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 5
        Slash: 2
  - type: Tag
    tags:
    - OE14Boar
  - type: Butcherable
    spawned:
    - id: OE14FoodMeatBoar
      amount: 4
    - id: OE14Leather1
      amount: 2
      maxAmount: 4
    - id: OE14ScrapLeather
      amount: 1
      maxAmount: 3
      prob: 0.5
    - id: OE14RuggedLeather1
      amount: 1
      prob: 0.1
    - id: OE14CheapFur
      amount: 1
      prob: 0.25
    - id: OE14Bone1
      amount: 2
      maxAmount: 4
  - type: Reproductive
    partnerWhitelist:
      tags:
      - OE14Boar
    offspring:
    - id: OE14MobBoar
      maxAmount: 1
  - type: ReproductivePartner
  - type: MovementSpeedModifier
    baseSprintSpeed: 4.5
  - type: NPCRetaliation
    attackMemoryLength: 10
  - type: FactionException
  - type: InteractionPopup
    successChance: 0.2
    interactSuccessString: petting-success-pig
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/pig_oink.ogg

- type: entity
  name: frog
  parent: OE14SimpleMobBase
  id: OE14MobFrog
  description: Green and constantly jumping frog, and perhaps thanks to it mosquitoes have not completely filled the marshes.
  categories: [ ForkFiltered ]
  components:
  - type: NpcFactionMember
    factions:
    - OE14Neutrals
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 5
  - type: Sprite
    drawdepth: SmallMobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      sprite: _OE14/Mobs/Animals/frog.rsi
      state: frog
  - type: Clothing
    quickEquip: false
    sprite: _OE14/Mobs/Animals/frog_helmet.rsi
    equippedPrefix: 0
    slots:
    - HEAD
  - type: SpriteMovement
    movementLayers:
      movement:
        state: frog_moving
    noMovementLayers:
      movement:
        state: frog_blinks
  - type: Item
    size: Normal
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Mouse_burning
  - type: Speech
    speechVerb: SmallMob
  - type: Appearance
  - type: Physics
  - type: FloorOcclusion
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 5
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      10: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: frog
      Dead:
        Base: frog_dead
  - type: Butcherable
    butcherDelay: 2
    spawned:
    - id: OE14FoodMeatFrogLeg
      amount: 2
    - id: OE14ScrapLeather
      amount: 1
      prob: 0.5
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Slash: 0
  - type: InteractionPopup
    successChance: 0.6
    interactSuccessString: petting-success-frog
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/frog_ribbit.ogg
  - type: CanEscapeInventory
  - type: Bloodstream
    bloodMaxVolume: 30
    bloodReagent: OE14BloodAnimal
  - type: Tag
    tags:
    - OE14Mosquito
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 60
      behaviors:
      - !type:GibBehavior
        recursive: false
  - type: SpamEmitSound
    minInterval: 10
    maxInterval: 20
    sound:
      collection: OE14Frog
      params:
        volume: -8
        variation: 0.125
  - type: SoundWhileAlive


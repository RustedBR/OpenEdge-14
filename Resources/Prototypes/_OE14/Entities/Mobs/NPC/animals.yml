- type: entity
  id: OE14MobRabbit
  parent: OE14SimpleMobBase
  name: rabbit
  description: A little fluffy rabbit. I could eat it.
  categories: [ ForkFiltered ]
  components:
  - type: HTN
    rootTask:
      task: RuminantCompound
  - type: NpcFactionMember
    factions:
    - OE14PeacefulAnimals
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      sprite: _OE14/Mobs/Animals/rabbit.rsi
      state: rabbit
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 8
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Tag
    tags:
    - OE14Rabbit
  - type: Reproductive
    partnerWhitelist:
      tags:
      - OE14Rabbit
    offspring:
    - id: OE14MobRabbit
      maxAmount: 2
  - type: ReproductivePartner
  - type: Speech
    speechVerb: SmallMob
  - type: Appearance
  - type: MobThresholds
    thresholds:
      0: Alive
      30: Dead
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Mouse_burning
  - type: CombatMode
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 1
  - type: MovementSpeedModifier
    baseWalkSpeed : 4
    baseSprintSpeed : 5
  - type: DamageStateVisuals
    states:
      Alive:
        Base: rabbit
      Dead:
        Base: rabbit_dead
  - type: Butcherable
    spawned:
    - id: OE14FoodMeatRabbit
      amount: 4
    - id: OE14ThinLeather1
      amount: 1
      maxAmount: 2
    - id: OE14Fur
      amount: 1
      prob: 0.75
  - type: Bloodstream
    bloodMaxVolume: 50
    bloodReagent: OE14BloodAnimal
  - type: InteractionPopup
    successChance: 0.5
    interactSuccessString: oe14-petting-success-rabbit
    interactFailureString: oe14-petting-failure-rabbit
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/fox_squeak.ogg


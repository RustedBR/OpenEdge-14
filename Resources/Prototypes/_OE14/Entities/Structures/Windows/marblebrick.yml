- type: entity
  id: OE14WindowMarbleBrick
  parent: OE14WindowBase
  name: marble brick window
  description: A marble brick wall with a glass window in it.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Windows/marble_bricks_window.rsi
  - type: Icon
    sprite: _OE14/Structures/Windows/marble_bricks_window.rsi
    state: full
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14GlassShard:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ChangeConstructionNodeBehavior
        node: OE14WindowMarbleBrickBroken
  - type: Construction
    graph: OE14WindowMarbleBrick
    node: OE14WindowMarbleBrick

- type: entity
  id: OE14WindowFrameMarbleBrick
  name: marble brick window frame
  parent: OE14BaseWindowFrame
  components:
  - type: Sprite
    sprite: _OE14/Structures/Windows/marble_bricks_window_frame.rsi
  - type: Icon
    sprite: _OE14/Structures/Windows/marble_bricks_window_frame.rsi
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14RockStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14MarbleBlock1:
            min: 1
            max: 2
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: OE14WindowMarbleBrick
    node: OE14WindowFrameMarbleBrick

- type: entity
  id: OE14WindowMarbleBrickBroken
  name: shattered marble brick window
  parent:
  - OE14BaseWindowFrameBroken
  - OE14WindowFrameMarbleBrick
  components:
  - type: Sprite
    sprite: _OE14/Structures/Windows/marble_bricks_window_broken.rsi
  - type: Icon
    sprite: _OE14/Structures/Windows/marble_bricks_window_broken.rsi
  - type: Construction
    graph: OE14WindowMarbleBrick
    node: OE14WindowMarbleBrickBroken

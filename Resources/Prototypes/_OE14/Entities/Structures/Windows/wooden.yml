- type: entity
  id: OE14WindowWooden
  parent:
  - OE14WindowBase
  - OE14BaseFlammable
  name: wooden window
  description: A wooden wall with a glass window in it.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Windows/wooden_window.rsi
  - type: Icon
    sprite: _OE14/Structures/Windows/wooden_window.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14GlassShard:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:ChangeConstructionNodeBehavior
        node: OE14WindowWoodenBroken
  - type: Construction
    graph: OE14WindowWooden
    node: OE14WindowWooden


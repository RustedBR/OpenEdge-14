- type: entity
  id: OE14CobwebRight1
  parent:
  - OE14BaseWallmount
  - OE14BaseFlammable
  name: cobweb
  description: The sticky web is surprisingly strong and unpleasant.
  categories: [ ForkFiltered ]
  suffix: Right. Corner.
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Sprite
    sprite: _OE14/Structures/Decoration/cobweb.rsi
    state: cobweb_right1
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpriteFade
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
  - type: OE14IgnitionModifier
    ignitionTimeModifier: 0.75
    hideCaution: true
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Mouse_burning # I need a burning sprite on the Wallmount

- type: entity
  id: OE14CobwebLeft1
  parent: OE14CobwebRight1
  suffix: Left. Corner.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Decoration/cobweb.rsi
    state: cobweb_left1

- type: entity
  id: OE14CobwebLeft2
  parent: OE14CobwebRight1
  suffix: Left. Flat.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Decoration/cobweb.rsi
    state: cobweb_left2

- type: entity
  id: OE14CobwebRight2
  parent: OE14CobwebLeft2
  suffix: Right. Flat.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Decoration/cobweb.rsi
    state: cobweb_right2

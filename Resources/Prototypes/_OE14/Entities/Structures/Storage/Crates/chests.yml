- type: entity
  parent:
  - OE14ChestGeneric
  - OE14BaseFlammable
  id: OE14WoodenChest
  name: wooden chest
  description: A simple wooden chest for easy storage of junk.
  components:
  - type: Icon
    sprite: _OE14/Structures/Storage/Crates/chest.rsi
    state: icon
  - type: Sprite
    sprite: _OE14/Structures/Storage/Crates/chest.rsi
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14WoodStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14WoodenPlanks1:
            min: 3
            max: 5
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: OE14WoodenChest
    node: OE14WoodenChest
    containers:
    - entity_storage
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 50
      OE14Iron: 10


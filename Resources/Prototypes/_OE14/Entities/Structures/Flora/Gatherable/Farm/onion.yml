- type: entity
  id: OE14PlantOnion
  parent: OE14GatherablePlantSingleHarvestBase
  name: onion
  description: He's so cute it brings tears to my eyes to cut him up.
  components:
  - type: Sprite
    layers:
    - state: liq-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: grow-1
      sprite: _OE14/Structures/Flora/Farm/onion.rsi
      map: ["enum.PlantVisualLayers.Base"]
  - type: OE14PlantGatherable
    loot:
      All: !type:AllSelector
        children:
        - id: OE14FoodOnion
          rolls: !type:RangeNumberSelector
            range: 4, 6


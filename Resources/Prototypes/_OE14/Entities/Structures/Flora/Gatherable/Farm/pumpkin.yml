- type: entity
  id: OE14PlantPumpkin
  parent: OE14GatherablePlantSingleHarvestBase
  name: pumpkin
  description: Legends say there is a pumpkin king who stares into your soul through the crowns of trees.
  components:
  - type: Sprite
    layers:
    - state: liq-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: grow-1
      sprite: _OE14/Structures/Flora/Farm/pumpkin.rsi
      map: ["enum.PlantVisualLayers.Base"]
  - type: OE14PlantGatherable
    loot:
      All: !type:AllSelector
        children:
        - id: OE14FoodPumpkin
          rolls: !type:RangeNumberSelector
            range: 4, 6
        - id: OE14SeedPumpkin
          rolls: !type:RangeNumberSelector
            range: 1, 2


- type: entity
  id: OE14PlantPepper
  parent: OE14GatherablePlantMultiHarvestBase
  name: pepper
  description: Russian roulette. Are you hot, or are you sweet peppers?
  components:
  - type: Sprite
    layers:
    - state: liq-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: grow-1
      sprite: _OE14/Structures/Flora/Farm/pepper.rsi
      map: ["enum.PlantVisualLayers.Base"]
  - type: OE14PlantVisuals
    growthSteps: 5
  - type: OE14PlantGatherable
    loot:
      All: !type:AllSelector
        children:
        - id: OE14FoodPepper
          rolls: !type:RangeNumberSelector
            range: 4, 6
        - id: OE14SeedPepper
          rolls: !type:RangeNumberSelector
            range: 1, 2


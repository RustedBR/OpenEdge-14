- type: entity
  id: OE14StoneWell
  parent: BaseStructure
  categories:
  - ForkFiltered
  name: well
  description: At the bottom of this well gurgles clear water. If you have a bucket,
    you can reach it.
  components:
  - type: Sprite
    noRot: true
    offset: 0, 0.3
    drawdepth: Mobs
    sprite: _OE14/Structures/Specific/Farming/well.rsi
    layers:
    - state: icon
  - type: DrawableSolution
    solution: pool
  - type: SolutionContainerManager
    solutions:
      pool:
        maxVol: 9999999
        reagents:
        - ReagentId: Water
          Quantity: 9999999
  - type: DrainableSolution
    solution: pool
  - type: Drink
    solution: pool
  localizationId: ent-OE14StoneWell
- type: entity
  id: OE14StoneWellBroken
  parent: OE14StoneWell
  categories:

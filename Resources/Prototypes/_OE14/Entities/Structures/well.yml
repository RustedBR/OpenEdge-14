    still water left.
  components:
  - type: Sprite
    noRot: true
    offset: 0, 0.3
    drawdepth: Mobs
    sprite: _OE14/Structures/Specific/Farming/well.rsi
    layers:
    - state: broken
  - type: SolutionContainerManager
    solutions:
      pool:
        maxVol: 999
        reagents:
        - ReagentId: Water
          Quantity: 200
  localizationId: ent-OE14StoneWellBroken
- type: entity
  id: OE14StoneWellGrovelling
  parent: OE14StoneWell
  categories:

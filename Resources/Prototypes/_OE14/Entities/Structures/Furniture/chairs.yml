- type: entity
  name: wooden chair
  description: Made of the most common planks. Simple and effective!
  id: OE14ChairWooden
  categories: [ ForkFiltered ]
  parent:
  - UnanchoredChairBase
  - OE14BaseFlammable
  components:
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14Wood
  - type: Sprite
    sprite: _OE14/Structures/Furniture/chairs.rsi
    state: wooden
  - type: Construction
    graph: OE14Seat
    node: OE14ChairWooden
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14WoodenPlanks1:
            min: 1
            max: 1


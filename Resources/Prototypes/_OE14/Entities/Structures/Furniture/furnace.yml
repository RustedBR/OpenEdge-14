- type: entity
  id: OE14BaseFireplace
  parent: BaseStructure
  categories: [ ForkFiltered ]
  abstract: true
  components:
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask:
        - TabletopMachineMask
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        hard: false
  - type: OE14FlammableAmbientSound
  - type: AmbientSound
    enabled: false
    volume: -5
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  - type: Appearance
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
  - type: Flammable
    fireSpread: false
    canResistFire: false
    alwaysCombustible: true
    canExtinguish: true
    firestacksOnIgnite: 0.5
    damage:
      types:
        Heat: 0
  - type: ItemPlacer
    maxEntities: 4
  - type: OE14FlammableEntityHeater
  - type: OE14FlammableSolutionHeater
  - type: OE14Fireplace
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,2,2
    cP14Ignorelist:
      components:
        - IgnitionSource
        - OE14DelayedIgnitionSource
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: OE14IgnitionModifier
    hideCaution: true

- type: entity
  id: OE14Furnace
  name: furnace
  parent: OE14BaseFireplace
  description: A furnace fueled by wood, coal, or any other burning material. Handy for heating your food or drinks.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Furniture/furnace.rsi
    layers:
      - state: base
      - state: fuel1
        visible: false
        map: ["fuel"]
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14Metallic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 80
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              OE14ScrapIron:
                min: 1
                max: 3
  - type: GenericVisualizer
    visuals:
      enum.FireplaceFuelVisuals.Status:
        fuel:
          Empty: { visible: false }
          Medium: { visible: true, state: fuel1 }
          Full: { visible: true, state: fuel2 }
  - type: FireVisuals
    sprite: _OE14/Structures/Furniture/furnace.rsi
    normalState: burning
  - type: Climbable
  - type: Anchorable
  - type: Rotatable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask:
        - TabletopMachineMask
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        hard: false
      fix2:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Storage
    grid:
    - 0,0,2,2
    whitelist:
      tags:
      - OE14FireplaceFuel
  - type: Construction
    graph: OE14Furnace
    node: OE14Furnace

- type: entity
  parent: OE14Furnace
  id: OE14FurnaceDebug
  suffix: Ignited, Infinity
  categories: [ DoNotMap ]
  components:
  - type: OE14AutoIgnite
  - type: OE14Fireplace
    fuelDrainingPerUpdate: 0
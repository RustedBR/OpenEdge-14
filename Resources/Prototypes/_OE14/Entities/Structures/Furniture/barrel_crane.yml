- type: entity
  id: OE14CraneBarrel
  parent: [BaseStructure, OE14BarrelSolution, OE14BaseFlammable]
  name: wooden crane barrel
  description: Large lying barrel with tap, for storing valuable liquids.
  suffix: Empty
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _OE14/Structures/Furniture/Barrels/crane_barrel.rsi
    layers:
      - state: barrel
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14Wood
  - type: Physics
    bodyType: Static
  - type: Transform
  - type: Anchorable
    delay: 3
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 80
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 5
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: barrel
    - trigger:
        !type:DamageTypeTrigger
        damageType: Piercing
        damage: 5
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: barrel
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:SpillBehavior
        solution: barrel
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: SolutionContainerManager
    solutions:
      barrel:
        maxVol: 500
  - type: Construction
    graph: OE14CraneBarrel
    node: OE14CraneBarrel
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 50

- type: entity
  parent: OE14CraneBarrel
  id: OE14CraneBarrelDwarfBeer
  suffix: Beer. Dwarf
  categories: [ ForkFiltered ]
  components:
  - type: SolutionContainerManager
    solutions:
      barrel:
        reagents:
        - ReagentId: OE14DwarfBeer
          Quantity: 500
  - type: Label
    currentLabel: oe14-reagent-name-dwarfbeer


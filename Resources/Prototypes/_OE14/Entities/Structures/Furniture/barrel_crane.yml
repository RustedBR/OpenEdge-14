- type: entity
  id: OE14CraneBarrelSmall
  parent: [BaseStructureDynamic, OE14BarrelSolution, OE14BaseFlammable]
  name: wooden small crane barrel
  description: A small lying barrel with a tap to quickly pour liquid into mugs.
  suffix: Empty
  categories: [ ForkFiltered ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _OE14/Structures/Furniture/Barrels/crane_barrel_small.rsi
    layers:
      - state: barrel
  - type: Transform
    anchored: true
  - type: Pullable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 200
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 5
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: barrel
    - trigger:
        !type:DamageTypeTrigger
        damageType: Piercing
        damage: 5
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: barrel
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:SpillBehavior
        solution: barrel
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: SolutionContainerManager
    solutions:
      barrel:
        maxVol: 50
  - type: Construction
    graph: OE14CraneBarrelSmall
    node: OE14CraneBarrelSmall


- type: entity
  parent:
  - BaseStructure
  id: OE14TableBase
  categories: [ ForkFiltered ]
  abstract: true
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask: # tables should collide with other tables
        - TableMask
        layer:
        - TableLayer
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/picaxe2.ogg
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHull
  - type: Climbable
  - type: PlaceableSurface

- type: entity
  parent:
  - OE14TableBase
  - OE14BaseFlammable
  id: OE14WoodenTableBase
  abstract: true
  components:
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 40
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
    - trigger:
        !type:DamageTrigger
        damage: 60
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14WoodenPlanks1:
            min: 1
            max: 1
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWood
  - type: FireVisuals
    sprite: _OE14/Effects/fire.rsi
    normalState: full

- type: entity
  parent: OE14WoodenTableBase
  id: OE14TableWoodenFrame
  name: wooden table frame
  description: Base for any wooden table
  components:
  - type: Sprite
    snapCardinals: true
    sprite: _OE14/Structures/Furniture/Tables/wood.rsi
    state: frame
  - type: Icon
    sprite: _OE14/Structures/Furniture/Tables/wood.rsi
    state: frame
  - type: Construction
    graph: OE14TableWooden
    node: OE14TableWoodenFrame


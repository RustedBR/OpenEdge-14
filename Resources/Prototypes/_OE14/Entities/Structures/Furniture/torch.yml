- type: entity
  id: OE14BaseTorch
  abstract: true
  description: A good, reliable light source. Too bad it doesn't last.
  categories: [ ForkFiltered ]
  components:
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14Wood
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 30
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
  - type: OE14FlammableAmbientSound
  - type: AmbientSound
    enabled: false
    volume: -15
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
  - type: Flammable
    fireSpread: false
    canResistFire: false
    alwaysCombustible: true
    canExtinguish: true
    firestacksOnIgnite: 0.5
    damage:
      types:
        Heat: 0
  - type: OE14Fireplace
    deleteOnEmpty: true
    maxFuelLimit: 1800
    fuel: 1800
  - type: Appearance
  - type: OE14IgnitionModifier
    hideCaution: true

- type: entity
  id: OE14FloorTorch
  parent:
  - OE14BaseTorch
  - BaseStructure
  name: floor torch
  components:
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _OE14/Structures/Furniture/torch_floor.rsi
    offset: 0, 0.3
    layers:
      - state: base
        map: ["fuel"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 1000
        layer:
        - LowImpassable
        - MidImpassable
  - type: FireVisuals
    sprite: _OE14/Structures/Furniture/torch_floor.rsi
    normalState: fire
  - type: GenericVisualizer
    visuals:
      enum.FireplaceFuelVisuals.Status:
        fuel:
          Empty: { state: burned }
          Medium: { state: base }
          Full: { state: base }
  - type: Construction
    graph: OE14FloorTorch
    node: OE14FloorTorch

- type: entity
  parent: OE14FloorTorch
  id: OE14FloorTorchIgnited
  suffix: Ignited
  components:
  - type: OE14AutoIgnite

- type: entity
  id: OE14FloorTorchAlwaysPowered
  name: floor torch
  parent: BaseStructure
  categories: [ ForkFiltered ]
  suffix: Debug, Infinite
  components:
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _OE14/Structures/Furniture/torch_floor.rsi
    offset: 0, 0.3
    layers:
      - state: base
      - state: fire
        shader: unshaded
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 1000
        layer:
        - LowImpassable
        - MidImpassable
  - type: PointLight
    color: "#e67c34"
    energy: 2
    radius: 8
  - type: AmbientSound
    enabled: true
    volume: -15
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg

- type: entity
  id: OE14WallmountTorch
  parent:
  - OE14BaseTorch
  - OE14BaseWallmount
  name: wallmount torch
  components:
  - type: Sprite
    sprite: _OE14/Structures/Furniture/wallmount_torch.rsi
    layers:
      - state: base
        map: ["fuel"]
  - type: FireVisuals
    sprite: _OE14/Structures/Furniture/wallmount_torch.rsi
    normalState: fire
  - type: GenericVisualizer
    visuals:
      enum.FireplaceFuelVisuals.Status:
        fuel:
          Empty: { state: burned }
          Medium: { state: base }
          Full: { state: base }
  - type: Construction
    graph: OE14WallmountTorch
    node: OE14WallmountTorch

- type: entity
  parent: OE14WallmountTorch
  id: OE14WallmountTorchIgnited
  suffix: Ignited
  components:
  - type: OE14AutoIgnite

- type: entity
  id: OE14WallmountTorchAlwaysPowered
  name: wallmount torch
  parent: OE14BaseWallmount
  suffix: Debug, Infinite
  components:
  - type: Sprite
    sprite: _OE14/Structures/Furniture/wallmount_torch.rsi
    layers:
      - state: base
      - state: fire
        shader: unshaded
  - type: PointLight
    color: "#e67c34"
    energy: 2
    radius: 8
  - type: AmbientSound
    enabled: true
    volume: -15
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg

# Stone brick

- type: entity
  id: OE14WallFrameStonebrick
  name: stone brick wall base
  parent: OE14BaseWallFrame
  components:
  - type: Sprite
    sprite: _OE14/Structures/Walls/bricks_stone_wall.rsi
    state: frame
  - type: Icon
    sprite: _OE14/Structures/Walls/bricks_stone_wall.rsi
    state: frame
  - type: Construction
    graph: OE14WallStoneBrick
    node: OE14WallFrameStoneBrick
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14RockStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14StoneBlock1:
            min: 1
            max: 2
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: OE14WallStonebrick
  name: stone brick wall
  parent: OE14BaseWall
  components:
  - type: Sprite
    sprite: _OE14/Structures/Walls/bricks_stone_wall.rsi
  - type: Icon
    sprite: _OE14/Structures/Walls/bricks_stone_wall.rsi
  - type: IconSmooth
    base: stonebricks
  - type: Construction
    graph: OE14WallStoneBrick
    node: OE14WallStoneBrick
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14RockStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14StoneBlock1:
            min: 1
            max: 2
      - !type:ChangeConstructionNodeBehavior
        node: OE14WallFrameStoneBrick
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: OE14WallpaperHolder


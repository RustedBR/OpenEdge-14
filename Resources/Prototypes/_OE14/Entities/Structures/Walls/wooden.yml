# Wooden

- type: entity
  id: OE14WallFrameWooden
  name: wooden wall frame
  parent:
  - OE14BaseWallFrame
  - OE14BaseFlammableSpreading
  components:
  - type: Sprite
    sprite: _OE14/Structures/Walls/wooden_wall.rsi
    state: frame
  - type: Icon
    sprite: _OE14/Structures/Walls/wooden_wall.rsi
    state: frame
  - type: Construction
    graph: OE14WallWooden
    node: OE14WallFrameWooden
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14WoodStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14WoodenPlanks1:
            min: 1
            max: 2
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: OE14WallWooden
  name: wooden wall
  parent:
  - OE14BaseWall
  - OE14BaseFlammableSpreading
  components:
  - type: Sprite
    sprite: _OE14/Structures/Walls/wooden_wall.rsi
  - type: Icon
    sprite: _OE14/Structures/Walls/wooden_wall.rsi
  - type: IconSmooth
    base: wood
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14WoodStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14WoodenPlanks1:
            min: 1
            max: 2
      - !type:ChangeConstructionNodeBehavior
        node: OE14WallFrameWooden
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: OE14WallWooden
    node: OE14WallWooden
  - type: OE14WallpaperHolder


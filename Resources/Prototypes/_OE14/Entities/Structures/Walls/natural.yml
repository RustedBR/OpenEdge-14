- type: entity
  id: OE14WallStone
  name: rock
  parent: OE14BaseWall
  description: A solid stone natural wall. It has a cave-like coldness to it.
  components:
  - type: Sprite
    sprite: _OE14/Structures/Walls/Natural/cave_stone.rsi
  - type: Icon
    sprite: _OE14/Structures/Walls/Natural/cave_stone.rsi
  - type: IconSmooth
    base: wall
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14RockStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14StoneBlock1:
            min: 5
            max: 7
      - !type:DoActsBehavior
        acts: ["Destruction"]


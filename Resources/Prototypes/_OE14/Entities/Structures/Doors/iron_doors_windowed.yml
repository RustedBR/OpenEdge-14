- type: entity
  id: OE14IronDoorWindowed
  parent:
  - OE14BaseDoor
  name: iron windowed door
  description: a solid iron door with a small window. You can look through it, of course, but it's hard to put your hand through.
  suffix: Opened
  components:
  - type: Sprite
    sprite: _OE14/Structures/Doors/iron_windowed_door.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Occluder
    enabled: false
  - type: Door
    occludes: false
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14MetallicStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ChangeConstructionNodeBehavior
        node: OE14IronDoorFrame
  - type: Construction
    graph: OE14IronDoor
    node: OE14IronDoor

- type: entity
  id: OE14IronDoorWindowedMirrored
  parent: OE14IronDoorWindowed
  suffix: Opened, Mirrored
  components:
  - type: Door
    openSpriteState: open_mirrored
    closedSpriteState: closed_mirrored
  - type: Construction
    graph: OE14IronDoor
    node: OE14IronDoorMirrored

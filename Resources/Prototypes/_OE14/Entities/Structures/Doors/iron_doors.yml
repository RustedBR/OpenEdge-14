- type: entity
  id: OE14IronDoor
  parent:
  - OE14BaseDoor
  name: iron door
  description: Well, if there's a solid iron door, there must be something valuable behind it.
  suffix: Opened
  components:
  - type: Sprite
    sprite: _OE14/Structures/Doors/iron_door.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Door
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14MetallicStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:ChangeConstructionNodeBehavior
        node: OE14IronDoorFrame
  - type: Construction
    graph: OE14IronDoor
    node: OE14IronDoor

- type: entity
  id: OE14IronDoorMirrored
  parent: OE14IronDoor
  suffix: Opened, Mirrored
  components:
  - type: Door
    openSpriteState: open_mirrored
    closedSpriteState: closed_mirrored
  - type: Construction
    graph: OE14IronDoor
    node: OE14IronDoorMirrored

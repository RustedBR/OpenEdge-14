- type: entity
  id: OE14WoodenBirchDoorWindowed
  parent:
  - OE14BaseDoor
  - OE14BaseFlammableSpreading
  name: wooden birch windowed door
  description: Not the most solid construction, but it's better than nothing.
  suffix: Opened
  components:
  - type: Sprite
    sprite: _OE14/Structures/Doors/wooden_birch_windowed_door.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Occluder
    enabled: false
  - type: Door
    occludes: false
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: OE14WoodStructural
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14BirchWoodenPlanks1:
            min: 1
            max: 2
      - !type:ChangeConstructionNodeBehavior
        node: OE14WoodenDoorFrame
  - type: Construction
    graph: OE14WoodenBirchDoor
    node: OE14WoodenBirchDoorWindowed

- type: entity
  id: OE14WoodenBirchDoorWindowedMirrored
  parent: OE14WoodenBirchDoorWindowed
  suffix: Opened, Mirrored
  components:
  - type: Door
    openSpriteState: open_mirrored
    closedSpriteState: closed_mirrored
  - type: Construction
    graph: OE14WoodenBirchDoor
    node: OE14WoodenBirchDoorWindowedMirrored

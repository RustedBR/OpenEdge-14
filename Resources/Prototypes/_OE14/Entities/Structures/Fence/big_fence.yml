- type: entity
  parent: BaseStructure
  id: OE14BaseFenceBig
  abstract: true
  categories: [ ForkFiltered ]
  name: big fence
  description: You definitely need a towel to get to the other side
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    drawdepth: Mobs
  - type: Icon
    state: full
  - type: PlacementReplacement
    key: walls
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/boxingpunch1.ogg"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 1000
        mask:
        - Impassable
        layer:
        - LowImpassable
        - MidImpassable
        - HighImpassable
        - InteractImpassable
  - type: IconSmooth
    key: OE14fencebig
    base: fence
    additionalKeys:
    - OE14wall

- type: entity
  parent:
  - OE14BaseFenceBig
  - OE14BaseFlammableSpreading
  id: OE14FenceBigWooden
  suffix: Wooden
  components:
  - type: Sprite
    sprite: _OE14/Structures/Fence/wooden_big.rsi
  - type: Icon
    sprite: _OE14/Structures/Fence/wooden_big.rsi
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14WoodenPlanks1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: OE14FenceBigWooden
    node: OE14FenceBigWooden

- type: entity
  parent: OE14FenceBigWooden
  id: OE14FenceBigWoodenBirch
  suffix: Wooden Birch
  components:
  - type: Sprite
    sprite: _OE14/Structures/Fence/wooden_birch_big.rsi
  - type: Icon
    sprite: _OE14/Structures/Fence/wooden_birch_big.rsi
  - type: Construction
    graph: OE14FenceBigWoodenBirch
    node: OE14FenceBigWoodenBirch

- type: entity
  parent: OE14BaseFenceBig
  id: OE14FenceBigIron
  suffix: Iron
  components:
  - type: Sprite
    sprite: _OE14/Structures/Fence/iron_big.rsi
  - type: Icon
    sprite: _OE14/Structures/Fence/iron_big.rsi
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14ScrapIron:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]


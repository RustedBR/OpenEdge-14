- type: entity
  abstract: true
  id: OE14BaseEssenceNode
  categories: [ ForkFiltered ]
  name: essence node
  description: A natural accumulation of magical essence.
  components:
  - type: Clickable
  - type: Sprite
    noRot: true
    drawdepth: Effects
    sprite: _OE14/Objects/Specific/Thaumaturgy/essence.rsi
    layers:
    - state: node
      shader: unshaded
  - type: Timer
  - type: TimedSpawner
    chance: 0.75
    intervalSeconds: 15
    minimumEntitiesSpawned: 1
    maximumEntitiesSpawned: 3
  - type: PointLight

- type: entity
  name: random essence node spawner
  id: OE14SpawnEssenceNodeRandom
  parent: MarkerBase
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - sprite: Markers/cross.rsi
      state: green
    - sprite: _OE14/Objects/Specific/Thaumaturgy/essence.rsi
      state: node
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - !type:GroupSelector
        weight: 60
        children:
        - id: OE14EssenceNodeEarth
        - id: OE14EssenceNodeFire
        - id: OE14EssenceNodeWater
        - id: OE14EssenceNodeAir
        - id: OE14EssenceNodeOrder
        - id: OE14EssenceNodeChaos


- type: entity
  id: OE14BaseCrystalSlot #TODO переструктуризовать объекты
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: OE14MagicEnergyCrystalSlot
    slotId: crystal_slot
  - type: ContainerContainer
    containers:
      crystal_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      crystal_slot:
        insertSound:
          path: /Audio/_OE14/Items/crystal_insert.ogg
          params:
            variation: 0.05
        ejectSound:
          path: /Audio/_OE14/Items/crystal_eject.ogg
          params:
            variation: 0.05
        ejectOnInteract: true
        name: oe14-magic-energy-crystal-slot-name
        whitelist:
          components:
          - OE14MagicEnergyCrystal


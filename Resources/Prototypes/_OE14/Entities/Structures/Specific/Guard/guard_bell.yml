    drawdepth: Mobs
    noRot: true
    offset: 0, 0.2
    sprite: _OE14/Structures/Specific/Guard/guard_bell.rsi
    layers:
    - state: base
  - type: Damageable
    damageContainer: Inorganic
  - type: TriggerOnActivate
  - type: OE14TriggerOnDamageReceived
  - type: SpawnOnTrigger
    proto: GuardBellEffect1

- type: entity
  id: OE14WallmountButtonBase
  abstract: true
  parent:
  - OE14BaseWallmount
  categories:
  - ForkFiltered
  name: wall button
  description: This button can activate something!
  components:
  - type: Sprite
    sprite: _OE14/Structures/Specific/Device/wallmount_buttons.rsi
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    canCollide: false
  - type: UseDelay
    delay: 0.5
  - type: SignalSwitch
    onPort: OE14Pressed
    offPort: OE14Pressed
    statusPort: OE14Pressed
  - type: Fixtures
  - type: DeviceNetwork
    deviceNetId: Wireless
  - type: WirelessNetworkConnection
    range: 10
  - type: DeviceLinkSource
    ports:
    - OE14Pressed
  localizationId: ent-OE14WallmountButtonBase
- type: entity
  id: OE14WallmouontButtonWooden
  parent: OE14WallmountButtonBase
  components:
  - type: Sprite
    state: wooden
  localizationId: ent-OE14WallmouontButtonWooden
- type: entity
  id: OE14WallmouontButtonStone
  parent: OE14WallmountButtonBase
  components:
  - type: Sprite
    state: stone
  localizationId: ent-OE14WallmouontButtonStone

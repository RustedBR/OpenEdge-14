- type: entity
  name: wallet
  description: A small wallet, handy for storing coins.
  id: OE14Wallet
  parent: BaseStorageItem
  suffix: Empty
  categories:
  - ForkFiltered
  components:
  - type: Sprite
    sprite: /Textures/_OE14/Objects/Economy/wallet.rsi
    layers:
    - state: wallet-0
      map:
      - enum.StorageFillLayers.Fill
  - type: Storage
    maxItemSize: Tiny
    grid:
    - 0,0,3,2
    quickInsert: true
    areaInsert: false
    storageOpenSound:
      collection: storageRustle
    storageInsertSound:
      collection: storageRustle
    whitelist:
      tags:
      - OE14Coin
      - Dice
  - type: UseDelay
    delay: 0.3
  - type: Appearance
  - type: StorageFillVisualizer
    maxFillLevels: 4
    fillBaseName: wallet
  - type: Dumpable
    soundDump:
      collection: OE14Coins
    multiplier: 0.8
  - type: Clothing
    slots:
    - belt
  - type: Item
    size: Normal
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: OE14ScrapLeather
      amount: 1
  localizationId: ent-OE14Wallet
- type: entity
  id: OE14WalletFilledTest
  parent: OE14Wallet
  suffix: Filled test
  components:
  - type: StorageFill
    contents:
    - id: OE14SilverCoin5
    - id: OE14SilverCoin1
    - id: OE14SilverCoin1
    - id: OE14CopperCoin
    - id: OE14CopperCoin
    - id: OE14CopperCoin
  localizationId: ent-OE14WalletFilledTest
- type: entity
  id: OE14WalletFilledMerchant
  parent: OE14Wallet
  suffix: Merchant
  components:
  - type: StorageFill
    contents:
    - id: OE14GoldCoin1
    - id: OE14SilverCoin5
    - id: OE14SilverCoin1
    - id: OE14SilverCoin1
    - id: OE14CopperCoin
    - id: OE14CopperCoin
    - id: OE14CopperCoin
  localizationId: ent-OE14WalletFilledMerchant
- type: entity
  id: OE14WalletFilledLootT1
  parent: OE14Wallet
  categories:
  - HideSpawnMenu
  components:
  - type: StorageFill
    contents:
    - id: OE14GoldCoin1
      prob: 0.001
      orGroup: ZombieLootT1
    - id: OE14SilverCoin5
      prob: 0.1
      orGroup: ZombieLootT1
    - id: OE14SilverCoin1
      prob: 0.3
      orGroup: ZombieLootT1
    - id: OE14CopperCoin5
      prob: 0.6
      orGroup: ZombieLootT1
    - id: OE14CopperCoin1
      orGroup: ZombieLootT1
  localizationId: ent-OE14WalletFilledLootT1

- type: entity
  parent: BaseItem
  id: OE14BaseKeyRing
  suffix: Empty
  name: key ring
  description: Allows you to comfortably store a large number of keys in one place.
  categories: [ ForkFiltered ]
  components:
  - type: OE14KeyRing
  - type: Sprite
    sprite: _OE14/Objects/keys.rsi
    layers:
    - state: keyring
    - state: ring-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: Appearance
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_OE14/Items/key_drop.ogg
      params:
        variation: 0.05
  - type: StorageFillVisualizer
    maxFillLevels: 4
    fillBaseName: ring
  - type: Storage
    grid:
    - 0,0,5,1
    maxItemSize: Small
    whitelist:
      tags:
        - OE14Key
        - OE14Lockpick
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: Clothing
    quickEquip: false
    slots:
    - keys
    - belt
  - type: PhysicalComposition
    materialComposition:
      OE14Iron: 5

- type: entity
  parent: OE14BaseKeyRing
  id: OE14KeyRingInnkeeper
  suffix: Innkeeper
  components:
  - type: StorageFill
    contents:
    - id: OE14KeyTavernHall
    - id: OE14KeyTavernStaff
    - id: OE14KeyTavernDormsAbstract # TODO: Move to main innkeeper
    - id: OE14KeyTavernDormsAbstract
    - id: OE14KeyTavernDormsAbstract
    - id: OE14KeyTavernDormsAbstract
    - id: OE14KeyTavernDormsAbstract


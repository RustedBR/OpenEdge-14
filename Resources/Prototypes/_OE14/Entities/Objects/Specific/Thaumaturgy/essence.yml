- type: entity
  abstract: true
  id: OE14BaseEssence
  categories: [ ForkFiltered ]
  name: magic essence
  description: Particles of magical energy polarised into a particular type of magic. Will be gone soon, so try to collect them as soon as possible!
  components:
  - type: Clickable
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _OE14/Objects/Specific/Thaumaturgy/essence.rsi
    layers:
    - state: small
      shader: unshaded
  - type: TimedDespawn
    lifetime: 60
  - type: CanMoveInAir
  - type: RandomWalk
    minSpeed: 0.25
    maxSpeed: 0.75
  - type: Physics
    bodyType: Dynamic
    bodyStatus: InAir
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        #- ItemMask # OE14 swap ItemMask to Impassable only
        - Impassable
        restitution: 0.3  # fite me
        friction: 0.2
  - type: ChasingWalk
    maxChaseRadius: 5
    minSpeed: 0.5
    maxSpeed: 1
    chasingComponent:
    - type: OE14MagicEssenceAttractor
  - type: OE14MagicEssence

# Basic 6

- type: entity
  parent: OE14BaseEssence
  id: OE14EssenceEarth
  name: terra
  components:
  - type: Sprite
    color: "#1cea42"
  - type: SolutionContainerManager
    solutions:
      essence:
        maxVol: 1
        reagents:
        - ReagentId: OE14EssenceEarth

- type: entity
  id: OE14CookingPot
  parent: OE14CookerBase
  name: cooking pot
  description: Container for cooking Grand Soup.
  components:
  - type: Sprite
    sprite: _OE14/Objects/Consumable/Food/Soups/cooking_pot.rsi
    layers:
    - state: base
      map:
      - enum.StorageVisualLayers.Base
    - map:
      - oe14_foodLayers
    - state: closed
      map:
      - base
    - state: cooking
      visible: false
      map:
      - cook
    - state: cooking
      visible: false
      color: '#38312e'
      map:
      - burn
  - type: SolutionContainerManager
    solutions:
      cooker:
        maxVol: 150
  - type: OE14FoodHolder
    foodType: Soup
    solutionId: cooker
    displacementRsiPath: _OE14/Objects/Consumable/Food/Soups/displacement_pot.rsi
    maxDisplacementFillLevels: 2
    canGiveFood: true
  - type: OE14FoodCooker
    foodType: Soup
    solutionId: cooker
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: RefillableSolution
    solution: cooker
  - type: Spillable
    solution: cooker
  - type: SolutionItemStatus
    solution: cooker
  - type: ExaminableSolution
    solution: cooker
  - type: AmbientSound
    sound:
      path: /Audio/_OE14/Ambience/pot_brewing.ogg
  - type: PhysicalComposition
    materialComposition:
      OE14Iron: 30
  - type: Storage
    storageOpenSound: /Audio/_OE14/Effects/pan_open.ogg
    storageCloseSound: /Audio/_OE14/Effects/pan_close.ogg
    storageInsertSound: /Audio/Items/toolbox_insert.ogg
    storageRemoveSound: /Audio/Items/toolbox_insert.ogg
    cP14Ignorelist:
      components:
      - OE14FoodHolder
      - FoodSequenceStartPoint
      - Injector
      - SolutionTransfer
  localizationId: ent-OE14CookingPot

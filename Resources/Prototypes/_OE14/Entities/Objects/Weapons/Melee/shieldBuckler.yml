- type: entity
  id: OE14BaseWeaponShieldBuckler
  abstract: true
  parent:
  - BaseItem
  - OE14BaseWeaponDestructible
  - OE14BaseWeaponSelfDamage
  name: buckler
  description: A small metallic shield, designed for quick parrying and blocking in close combat.
  components:
  - type: Item
    size: Ginormous
  - type: Blocking
    passiveBlockFraction: 0.3
    activeBlockFraction: 0.6
    passiveBlockModifier:
      coefficients:
        Blunt: 0.75
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.6
    activeBlockModifier:
      coefficients:
        Blunt: 0.5
        Slash: 0.4
        Piercing: 0.4
        Heat: 0.4
  - type: Clothing
    equipDelay: 0.5
    unequipDelay: 0.5
    quickEquip: false
    breakOnMove: false
    slots:
    - neck
  - type: OE14MeleeParry
  - type: MeleeWeapon
    resetOnHandSelected: false
    angle: 90
    attackRate: 2
    range: 0.75
    wideAnimationRotation: 0
    animation: OE14WeaponArcThrust
    wideAnimation: OE14WeaponArcSlash
    damage:
      types:
        Blunt: 2
    soundHit:
      collection: MetalThud
    cPAnimationLength: 0.6
    cPAnimationOffset: 0.5
  - type: Damageable
    damageContainer: Shield
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 150
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 125
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              OE14IronBar1:
                min: 1
                max: 1

- type: entity
  parent: OE14BaseWeaponShieldBuckler
  id: OE14WeaponShieldBuckler
  components:
  - type: Sprite
    sprite: _OE14/Objects/Weapons/Melee/ShieldBuckler/iron.rsi
    state: icon
  - type: PhysicalComposition
    materialComposition:
      OE14Iron: 20
  - type: OE14ModularCraftStartPoint
    startSlots:
      - OE14ModularSlotGem
      - OE14ModularSlotModification
  - type: OE14StatBonus
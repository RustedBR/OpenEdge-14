- type: entity
  parent: OE14BaseWeaponSword
  id: OE14WeaponSwordIron
  name: iron sword
  description: A finely crafted sword favored by imperial officers. Its blade gleams
    with authority and tradition.
  components:
  - type: Sprite
    sprite: _OE14/Objects/Weapons/Melee/Sword/iron.rsi
    state: icon
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 10
      OE14Iron: 20
  - type: OE14ModularCraftStartPoint
    startSlots:
    - OE14ModularSlotGem
    - OE14ModularSlotModification
  - type: OE14StatBonus
  localizationId: ent-OE14WeaponSwordIron

  - BaseItem
  - OE14BaseWeaponChemical
  - OE14BaseWeaponDestructible
  - OE14BaseWeaponSelfDamage
  - OE14BaseWeaponSharp
  components:
  - type: Item
    size: Ginormous
  - type: MeleeWeapon
    attackRate: 1.5
    range: 1.2
    angle: 60
    wideAnimationRotation: -90
    damage:
      types:
        Slash: 4.25
    animation: OE14WeaponArcThrust
    wideAnimation: OE14WeaponArcSlash
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    cPAnimationLength: 0.25
    cPAnimationOffset: 1
  - type: OE14ComboBonusMeleeDamage
    bonusDamage:
      types:
        Piercing: 2.55

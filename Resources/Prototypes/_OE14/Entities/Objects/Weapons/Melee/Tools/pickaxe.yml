  components:
  - type: Sprite
    sprite: _OE14/Objects/Weapons/Melee/Pickaxe/iron.rsi
    state: icon
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 20
      OE14Iron: 20
  localizationId: ent-OE14WeaponPickaxeIron

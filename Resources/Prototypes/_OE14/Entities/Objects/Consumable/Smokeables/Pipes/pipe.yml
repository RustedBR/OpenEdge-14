- type: entity
  id: OE14SmokingPipe
  parent: BaseSmokingPipe
  name: pipe
  description: A comfortable and practical smoking pipe, the latest fashion in the Empire.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    sprite: _OE14/Objects/Consumable/Smokeables/Pipes/pipe.rsi
    state: unlit-icon
  - type: Clothing
    sprite: _OE14/Objects/Consumable/Smokeables/Pipes/pipe.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: _OE14/Objects/Consumable/Smokeables/Pipes/pipe.rsi
  - type: Appearance
  - type: BurnStateVisuals
    unlitIcon: unlit-icon
  - type: OE14IgnitionModifier
    hideCaution: true
  - type: StaticPrice
    price: 1
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 20 # 2 wooden plank in craft

- type: entity
  id: OE14SmokingPipeFilledTobacco
  parent: OE14SmokingPipe
  suffix: Tobacco
  categories: [ ForkFiltered ]
  components:
  - type: ContainerContainer
    containers:
      bowl_slot: !type:ContainerSlot
  - type: ItemSlots
  - type: SmokingPipe
    bowl_slot:
      name: smoking-pipe-slot-component-slot-name-bowl
      startingItem: OE14GroundTobacco
      whitelist:
        tags:
          - Smokable
      insertSound:
        path: /Audio/Weapons/Guns/Empty/empty.ogg
      ejectSound:
        path: /Audio/Weapons/Guns/Empty/empty.ogg

- type: entity
  id: OE14SmokingPipeFilledSage
  parent: OE14SmokingPipe
  suffix: Sage
  categories: [ ForkFiltered ]
  components:
  - type: ContainerContainer
    containers:
      bowl_slot: !type:ContainerSlot
  - type: ItemSlots
  - type: SmokingPipe
    bowl_slot:
      name: smoking-pipe-slot-component-slot-name-bowl
      startingItem: OE14GroundSage
      whitelist:
        tags:
          - Smokable
      insertSound:
        path: /Audio/Weapons/Guns/Empty/empty.ogg
      ejectSound:
        path: /Audio/Weapons/Guns/Empty/empty.ogg

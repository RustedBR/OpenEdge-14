- type: entity
  name: green bottle
  parent: OE14BaseVialFragile
  id: OE14GreenBottle
  suffix: Empty
  categories:
  - ForkFiltered
  description: A green bottle perfect for drinking beer.
  components:
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          true:
            state: icon_open
          false:
            state: icon_empty
  - type: Sprite
    sprite: _OE14/Objects/Consumable/Drinks/green2_bottle.rsi
    layers:
    - state: fill-1
      map:
      - enum.SolutionContainerLayers.Fill
      visible: false
    - state: icon
      map:
      - enum.OpenableVisuals.Layer
  - type: SolutionContainerManager
    solutions:
      vial:
        maxVol: 20
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: fill-
  localizationId: ent-OE14GreenBottle

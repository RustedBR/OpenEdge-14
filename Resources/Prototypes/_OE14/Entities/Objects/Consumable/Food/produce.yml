- type: entity
  id: OE14FoodCabbage
  parent: FoodInjectableBase
  categories: [ ForkFiltered ]
  name: cabbage
  description: Green edible ball.
  components:
  - type: Item
    size: Normal
  - type: FlavorProfile
    flavors:
      - cabbage
  - type: Sprite
    sprite: _OE14/Objects/Flora/Farm/cabbage.rsi
    layers:
      - state: base1
        map: [ "random" ]
  - type: RandomSprite
    available:
      - random:
          base1: ""
          base2: ""
          base3: ""
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 12
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 0.5
  - type: SliceableFood
    count: 4
    sliceTime: 1.5
    slice: OE14FoodCabbageSlice
  - type: Tag
    tags:
    - OE14FarmFood
    - OE14Vegetable
    - OE14Salad
    - OE14Cabbage


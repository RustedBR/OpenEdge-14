- type: entity
  id: OE14BloodFlower
  parent: OE14WildProduceBase
  name: blood rose
  description: Scarlet flowers growing where blood has been spilled.
  components:
  - type: Sprite
    sprite: _OE14/Objects/Flora/Wild/red_rose.rsi
    layers:
    - state: base1
      map:
      - random
  - type: RandomSprite
    available:
    - random:
        base1: ''
        base2: ''
  - type: FlavorProfile
    flavors:
    - OE14Metallic
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: OE14BloodFlowerSap
        Quantity: 10
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 14
        reagents:
        - ReagentId: OE14BloodFlowerSap
          Quantity: 10
  - type: Tag
    tags:
    - OE14FitInMortar
    - OE14AlchemicalHerbals
    - OE14BloodFlower
  - type: Clothing
    sprite: _OE14/Objects/Flora/Wild/red_rose.rsi
    slots:
    - mask
    - head
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: fold-flip-verb
    foldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped
    foldedHeldPrefix: flipped
  localizationId: ent-OE14BloodFlower

- type: entity
  id: OE14Scissors
  name: scissors
  description: A tool for shredding wool, hair, clothing, and, if not handled carefully,
    even fingers.
  categories:
  - ForkFiltered
  parent: BaseItem
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _OE14/Objects/Tools/scissors.rsi
    state: icon
  - type: MagicMirror
  - type: ActivatableUI
    key: enum.MagicMirrorUiKey.Key
    inHandsOnly: true
    requireActiveHand: true
  - type: UserInterface
    interfaces:
      enum.MagicMirrorUiKey.Key:
        type: MagicMirrorBoundUserInterface
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Piercing: 4
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tag
    tags:
    - OE14Scissors
  - type: PhysicalComposition
    materialComposition:
      OE14Iron: 10
  localizationId: ent-OE14Scissors

- type: entity
  parent: BaseItem
  id: OE14Bucket
  name: bucket
  description: It's a boring old bucket.
  categories:
  - ForkFiltered
  components:
  - type: Drink
    solution: bucket
    ignoreEmpty: true
  - type: Sprite
    sprite: _OE14/Objects/Tools/wooden_bucket.rsi
    layers:
    - state: icon
    - map:
      - enum.SolutionContainerLayers.Fill
      state: fill-1
      visible: false
  - type: Item
    size: Ginormous
  - type: Clothing
    sprite: _OE14/Objects/Tools/wooden_bucket.rsi
    clothingVisuals:
      head:
      - state: equipped-HELMET
    equipDelay: 0.25
    unequipDelay: 0.25
    quickEquip: false
    breakOnMove: false
    slots:
    - head
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.98
        Slash: 0.96
  - type: ClothingSpeedModifier
    walkModifier: 0.96
    sprintModifier: 0.8
  - type: SolutionContainerManager
    solutions:
      bucket:
        maxVol: 50
  - type: Injector
    solutionName: bucket
    injectOnly: false
    ignoreMobs: true
    ignoreClosed: false
    transferAmounts:
    - 10
    - 25
    - 50
    currentTransferAmount: 50
    toggleState: 1
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: MeleeWeapon
    soundNoDamage:
      path: /Audio/Effects/Fluids/splat.ogg
    damage:
      types:
        Blunt: 0
  - type: Spillable
    solution: bucket
  - type: SpillWhenWorn
    solution: bucket
  - type: OE14WeatherRefillable
    solution: bucket
  - type: MixableSolution
    solution: bucket
  - type: RefillableSolution
    solution: bucket
  - type: DrainableSolution
    solution: bucket
  - type: SolutionItemStatus
    solution: bucket
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill-
  - type: ExaminableSolution
    solution: bucket
  - type: Tag
    tags:
    - Bucket
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 30
      OE14Cloth: 20
  localizationId: ent-OE14Bucket
- type: entity
  parent: OE14Bucket
  id: OE14BucketLucens
  name: lucens bucket
  description: It's a boring old bucket, made less boring by being blue.
  components:
  - type: Sprite
    sprite: _OE14/Objects/Tools/lucens_bucket.rsi
  - type: Clothing
    sprite: _OE14/Objects/Tools/lucens_bucket.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.94
        Slash: 0.93
  - type: ClothingSpeedModifier
    walkModifier: 0.98
  - type: PhysicalComposition
    materialComposition:
      OE14LucensWoodenPlanks: 30
      OE14Cloth: 20
  localizationId: ent-OE14BucketLucens

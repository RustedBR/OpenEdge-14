- type: entity
  id: OE14Torch
  parent:
  - BaseItem
  - OE14BaseTorch
  name: torch
  description: At its core, a stick burning on one side. Used to light up the area.
  categories:
  - ForkFiltered
  components:
  - type: Sprite
    sprite: _OE14/Objects/Tools/torch.rsi
    layers:
    - state: torch-unlit
      map:
      - fuel
  - type: Item
    size: Normal
    shape:
    - 0,0,0,2
    storedRotation: -65
  - type: FireVisuals
    sprite: _OE14/Objects/Tools/torch.rsi
    normalState: lit-overlay
  - type: ToggleableLightVisuals
    spriteLayer: null
    inhandVisuals:
      left:
      - state: lit-inhand-left
        shader: unshaded
      right:
      - state: lit-inhand-right
        shader: unshaded
  - type: GenericVisualizer
    visuals:
      enum.FireplaceFuelVisuals.Status:
        fuel:
          Empty:
            state: torch-spent
          Medium:
            state: torch-unlit
          Full:
            state: torch-unlit
  - type: OE14DelayedIgnitionSource
  - type: OE14IgnitionModifier
    hideCaution: true
  - type: Construction
    graph: OE14Torch
    node: oe14torch
  - type: MeleeWeapon
    attackRate: 1.5
    wideAnimationRotation: 240
    wideAnimation: OE14WeaponArcSlash
    damage:
      types:
        Blunt: 4
  - type: OE14FlammableBonusDamage
  - type: UseDelay
  - type: ExtinguishOnInteract
    extinguishAttemptSound:
      path: /Audio/Items/candle_blowing.ogg
      params:
        variation: 0.05
        volume: 10
  - type: Tag
    tags:
    - OE14Torch
  - type: PhysicalComposition
    materialComposition:
      OE14WoodenPlanks: 10
      OE14Cloth: 10
  localizationId: ent-OE14Torch
- type: entity
  parent: OE14Torch
  id: OE14TorchIgnited
  suffix: Ignited
  components:
  - type: OE14AutoIgnite
  localizationId: ent-OE14TorchIgnited

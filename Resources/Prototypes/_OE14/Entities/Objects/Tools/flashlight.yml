- type: entity
  parent:
  - BaseItem
  - OE14BaseCrystalSlot
  id: OE14CrystalLamp
  abstract: true
  name: crystal lamp
  description: A device that converts energy from crystals into a source of directional light.  Convenient for traveling
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    sprite: _OE14/Objects/Tools/crystal_lamp.rsi
    noRot: false
  - type: Clothing
    equipDelay: 0.25
    unequipDelay: 0.25
    sprite: _OE14/Objects/Tools/crystal_lamp.rsi
    quickEquip: false
    breakOnMove: false
    slots:
    - belt
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: OE14Metallic
  - type: OE14MeleeSelfDamage
    damageToSelf:
      types:
        Structural: 10 #little jank, but Metallic is resistant to Blunt. Breaks in 3 strikes, or 2 fireballs.
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          OE14ScrapCopper:
            min: 1
            max: 2
          OE14ScrapIron:
            min: 0
            max: 1
  - type: MeleeWeapon
    attackRate: 0.6
    wideAnimationRotation: 10
    wideAnimation: OE14WeaponArcSlash
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud
    cPAnimationLength: 0.25
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/toolbox_drop.ogg
  - type: Item
    size: Normal
    shape:
    - 0, 0, 1, 1
    sprite: _OE14/Objects/Tools/crystal_lamp.rsi
  - type: Rotatable
  - type: PointLight
    enabled: false
    color: "#FFFFFF"
    mask: /Textures/_OE14/Effects/LightMasks/crystal_cone.png
    autoRot: true
    energy: 3
    radius: 6
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.OE14MagicSlotVisuals.Inserted:
        crystal:
          True: { visible: true }
          False: { visible: false }
      enum.OE14MagicSlotVisuals.Powered:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: OE14MagicLantern
  - type: OE14MagicEnergyDraw
    energy: -0.1
    delay: 3
  - type: ItemSlots
    slots:
      crystal_slot:
        insertSound:
          path: /Audio/_OE14/Items/crystal_insert.ogg
          params:
            variation: 0.05
        ejectSound:
          path: /Audio/_OE14/Items/crystal_eject.ogg
          params:
            variation: 0.05
        ejectOnInteract: false
        name: oe14-magic-energy-crystal-slot-name
        whitelist:
          components:
          - OE14MagicEnergyCrystal
  - type: PhysicalComposition
    materialComposition:
      OE14Copper: 20 # 2 copper bar
      OE14Iron: 10 # 1 iron bar

- type: entity
  parent: OE14CrystalLamp
  id: OE14CrystalLampBlueEmpty
  name: blue crystal lamp
  suffix: Blue, Empty
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: light_icon
      color: "#47F8FF"
      visible: false
      map: ["crystal"]
    - state: light_icon
      color: "#47F8FF"
      visible: false
      map: ["light"]
      shader: unshaded
  - type: PointLight
    color: "#47F8FF"

- type: entity
  parent: OE14CrystalLamp
  id: OE14CrystalLampOrangeEmpty
  name: orange crystal lamp
  suffix: Orange, Empty
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: light_icon
      color: "#d68f4d"
      map: ["crystal"]
      visible: false
    - state: light_icon
      color: "#d68f4d"
      map: ["light"]
      visible: false
      shader: unshaded
  - type: PointLight
    color: "#d68f4d"
    energy: 5


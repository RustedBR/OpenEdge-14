- type: entity
  id: OE14JackOLantern
  name: jack-o lantern spawner
  description: Oooh! Scary!
  parent: MarkerBase
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
      - state: green
      - sprite: _OE14/Objects/Misc/halloween_pumpkin.rsi
        state: base2
      - sprite: _OE14/Objects/Misc/halloween_pumpkin.rsi
        state: light-base2
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: OE14JackOLanternTable

- type: entityTable
  id: OE14JackOLanternTable
  table: !type:GroupSelector
    children:
    - id: OE14JackOLanternVariant1
    - id: OE14JackOLanternVariant2
    - id: OE14JackOLanternVariant3
    - id: OE14JackOLanternVariant4

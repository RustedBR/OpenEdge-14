      path: /Audio/_OE14/Effects/bell.ogg
      params:
        variation: 0.03
        volume: 3
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_OE14/Effects/bell.ogg
      params:
        variation: 0.03
        volume: 3
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_OE14/Effects/bell_short.ogg
      params:
        variation: 0.03
        volume: 3
  - type: UseDelay
    delay: 1.5
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit:
      path: /Audio/_OE14/Effects/bell_short.ogg
      params:
        variation: 0.03
        volume: 3
    damage:
      types:
        Blunt: 4
  localizationId: ent-OE14Bell

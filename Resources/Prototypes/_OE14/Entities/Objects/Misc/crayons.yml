- type: entity
  abstract: true
  parent: BaseItem
  id: OE14Crayon
  name: crayon
  description: A colourful crayon.
  categories:
  - ForkFiltered
  components:
  - type: Sprite
    sprite: _OE14/Objects/Specific/Thaumaturgy/crayon.rsi
    layers:
    - state: handle
    - state: crayon
      color: white
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Write
    - Crayon
  - type: UserInterface
    interfaces:
      enum.CrayonUiKey.Key:
        type: CrayonBoundUserInterface
  - type: Crayon
    capacity: 15
  localizationId: ent-OE14Crayon

      - state: crayon-inhand-left
        color: white
      right:
      - state: handle-inhand-right
      - state: crayon-inhand-right
        color: white
  - type: Crayon
    color: white
  - type: StaticPrice
    price: 4
  localizationId: ent-OE14CrayonWhite

- type: entity
  id: OE14ActionSpellFlashLight
  parent: OE14ActionSpellBase
  name: Flash Light
  description: Creates a flash of bright, blinding light.
  components:
  - type: OE14ActionManaCost
    manaCost: 10
  - type: OE14ActionSpeaking
    startSpeech: "Lux clara..."
    endSpeech: "excaecant inimicos meos"
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneFlashLight
  - type: DoAfterArgs
    delay: 0.5
    breakOnDamage: true
  - type: Action
    useDelay: 6
    icon:
      sprite: _OE14/Actions/Spells/light.rsi
      state: flash_light
  - type: TargetAction
    range: 10
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectFlashLight
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14SpawnEffectFlashLight

- type: entity
  id: OE14RuneFlashLight
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#efedff"
  - type: Sprite
    layers:
    - state: sun
      color: "#efedff"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectFlashLight
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#efedff"
      shader: unshaded

- type: entity
  id: OE14SpawnEffectFlashLight
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: /Textures/Objects/Fun/goldbikehorn.rsi
    visible: false
    state: icon
  - type: TriggerOnSpawn
  - type: TimedDespawn
    lifetime: 5
  - type: FlashOnTrigger
    range: 4
    duration: 4
  - type: SpawnOnTrigger
    proto: OE14SpellFlashEffect

- type: entity
  id: OE14SpellFlashEffect
  categories: [ HideSpawnMenu ]
  save: false
  components:
    - type: PointLight
      enabled: true
      radius: 5
      energy: 14
      netsync: false
    - type: LightFade
      duration: 0.5
    - type: TimedDespawn
      lifetime: 0.5

- type: entity
  parent: OE14BaseSpellScrollLight
  id: OE14SpellScrollFlashLight
  name: flash light spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellFlashLight


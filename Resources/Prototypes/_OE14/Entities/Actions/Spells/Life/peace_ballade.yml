- type: entity
  id: OE14ActionSpellPeaceBallade
  parent: OE14ActionSpellBase
  name: Peace ballade
  description: Your music is filled with peaceful magic, forbidding anyone near you to fight.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.8
  - type: OE14ActionManaCost
    manaCost: 2
  - type: DoAfterArgs
    hidden: true
    repeat: true
    delay: 1
  - type: OE14ActionRequiredMusicTool
  - type: OE14ActionDoAfterVisuals
    proto: OE14RunePeaceBallade
  - type: Action
    sound: null
    icon:
      sprite: _OE14/Actions/Spells/healing.rsi
      state: peace_music
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellArea
        range: 4
        maxTargets: 8
        affectCaster: true
        whitelist:
          components:
          - MobState
        effects:
        - !type:OE14SpellSpawnEntityOnTarget
          spawns:
          - OE14ImpactEffectPeaceBallade
        - !type:OE14SpellApplyEntityEffect
          effects:
          - !type:GenericStatusEffect
            key: Pacified
            component: Pacified
            type: Add
            time: 1.8

- type: entity
  id: OE14ImpactEffectPeaceBallade
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_5
      color: "#bd4fda"
      shader: unshaded

- type: entity
  id: OE14RunePeaceBallade
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#bd4fda"
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_3
      color: "#bd4fda"
      shader: unshaded


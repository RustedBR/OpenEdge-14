- type: entity
  id: OE14ActionAirSaturation
  parent: OE14ActionSpellBase
  name: Air saturation
  description: Você envolve o alvo com ar fresco, curando a sufocação. Funciona em estado crítico.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.4
  - type: OE14ActionIntScaledDescription
    baseDescription: Você envolve o alvo com ar fresco, curando a sufocação. Funciona em estado crítico.
    scaleEntries:
    - label: Cura
      baseValue: 10.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 5
  - type: OE14ActionTargetMobStatusRequired
    allowedStates:
    - Alive
    - Critical
  - type: DoAfterArgs
    delay: 1
    breakOnDamage: true
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneAirSaturation
  - type: Action
    useDelay: 2
    icon:
      sprite: _OE14/Actions/Spells/healing.rsi
      state: air_saturation
  - type: TargetAction
    range: 2
    interactOnMiss: false
  - type: EntityTargetAction
    event: !type:OE14EntityTargetModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectAirSaturation
      - !type:OE14SpellApplyDamageScaled
        damage:
          types:
            Asphyxiation: -10
      - !type:OE14SpellApplyEntityEffect
        effects:
        - !type:Jitter

# Effects

- type: entity
  id: OE14ImpactEffectAirSaturation
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#c0e8fa"
      shader: unshaded

- type: entity
  id: OE14RuneAirSaturation
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#c0e8fa"
  - type: Sprite
    layers:
    - state: sun
      color: "#5096d4"
      shader: unshaded
    - state: medium_circle
      color: "#c0e8fa"
      shader: unshaded


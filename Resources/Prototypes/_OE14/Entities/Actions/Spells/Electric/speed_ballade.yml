- type: entity
  id: OE14ActionSpellSpeedBallade
  parent: OE14ActionSpellBase
  name: Balada da velocidade
  description: Sua música está cheia de magia acelerada, aumentando a velocidade dos seres próximos.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 1
  - type: OE14ActionIntScaledDescription
    baseDescription: Sua música está cheia de magia acelerada, aumentando a velocidade dos seres próximos.
    scaleEntries:
    - label: Alcance
      baseValue: 5.0
      unit: " tiles"
      decimals: 1
      isAdditive: true
      intBonus: 0.1
    - label: Alvos
      baseValue: 4.0
      unit: ""
      decimals: 0
      isAdditive: true
      intBonus: 0.2
  - type: OE14ActionManaCost
    manaCost: 1
  - type: DoAfterArgs
    hidden: true
    delay: 0.5
  - type: OE14ActionRequiredMusicTool
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneSpeedBallade
  - type: Action
    useDelay: 15
    icon:
      sprite: _OE14/Actions/Spells/electromancy.rsi
      state: speed_music
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellArea
        affectCaster: true
        range: 5
        maxTargets: 4
        intRangeBonus: 0.1
        intMaxTargetsBonus: 0.2
        whitelist:
          components:
          - MobState
        effects:
        - !type:OE14SpellSpawnEntityOnTarget
          spawns:
          - OE14ImpactEffectSpeedBallade
        - !type:OE14SpellApplyEntityEffect
          effects:
          - !type:MovespeedModifier
            walkSpeedModifier: 1.2
            sprintSpeedModifier: 1.2
            statusLifetime: 1.8

- type: entity
  id: OE14ImpactEffectSpeedBallade
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_5
      color: "#e8cb56"
      shader: unshaded

- type: entity
  id: OE14RuneSpeedBallade
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#e8cb56"
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_3
      color: "#e8cb56"
      shader: unshaded


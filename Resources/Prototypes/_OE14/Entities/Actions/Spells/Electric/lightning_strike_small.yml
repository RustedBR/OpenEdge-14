- type: entity
  id: OE14ActionSpellLightningStrikeSmall
  parent: OE14ActionSpellBase
  name: Raio menor
  description: Você carrega um raio que queima parte da estamina do alvo.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.5
  - type: OE14ActionIntScaledDescription
    baseDescription: Você carrega um raio que queima parte da estamina do alvo.
    scaleEntries:
    - label: Dano
      baseValue: 4.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 7
  - type: OE14ActionDangerous
  - type: Action
    useDelay: 4
    icon:
      sprite: _OE14/Actions/Spells/electromancy.rsi
      state: lightning_strike_small
  - type: TargetAction
    range: 3
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:OE14EntityTargetModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ElectrifiedEffect
      - !type:OE14SpellCreateBeam
        beamProto: OE14LightningStrikeSmallBeam
      - !type:OE14SpellApplyDamageScaled
        damage:
          types:
            Shock: 4
      - !type:OE14SpellApplyEntityEffect
        effects:
        - !type:Jitter
        - !type:OE14StaminaChange
          staminaDelta: -15
      - !type:OE14SpellThrowFromUser
        throwPower: 2
        distance: 0.5

- type: entity
  name: lightning
  id: OE14LightningStrikeSmallBeam
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: /Textures/_OE14/Effects/Beams/lightning.rsi
    drawdepth: Effects
    layers:
    - state: lightning_small
      shader: unshaded
  - type: Physics
    canCollide: false
  - type: PointLight
    enabled: true
    color: "#e8ff4c"
    radius: 1.2
    softness: 1
    autoRot: true
    castShadows: false
  - type: Beam
    sound: 
      collection: sparks
  - type: TimedDespawn
    lifetime: 1
  - type: LightFade
    duration: 1
  - type: Tag
    tags:
      - HideContextMenu
  - type: OE14SpellEffectOnCollide
    effects:
    - !type:OE14SpellSpawnEntityOnTarget
      spawns:
      - OE14ElectrifiedEffect
    - !type:OE14SpellApplyEntityEffect
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Shock: 2
      - !type:Jitter
      - !type:OE14StaminaChange
        staminaDelta: -8
- type: entity
  id: OE14ActionSpellElectricTrap
  parent: OE14ActionSpellBase
  name: Electric trap
  description: Creates a electric trap at the selected location. Don't forget to recharge it with mana.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.9
  - type: OE14ActionManaCost
    manaCost: 40
  - type: OE14ActionSpeaking
    startSpeech: "Signum electricum..."
    endSpeech: "hunc locum custodi"
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneElectricTrap
  - type: Action
    useDelay: 4
    icon:
      sprite: _OE14/Actions/Spells/electromancy.rsi
      state: electric_trap
  - type: TargetAction
    range: 3
  - type: DoAfterArgs
    delay: 2
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectElectricTrap
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14SpawnMagicElectricTrap

- type: entity
  id: OE14RuneElectricTrap
  parent: OE14BaseMagicTrap
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#e8ff4c"
  - type: Sprite
    layers:
    - state: small_circle
      color: "#e8ff4c"
      shader: unshaded
    - state: rune_fire
      color: "#e8ff4c"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectElectricTrap
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#e8ff4c"
      shader: unshaded

- type: entity
  id: OE14SpawnMagicElectricTrap
  parent: OE14BaseMagicTrap
  name: electric trap
  description: A rune of electric drawn on the ground using magic — it's best not to step on it.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: small_circle
      color: "#e8ff4c"
      shader: unshaded
    - state: rune_energia
      color: "#e8ff4c"
      shader: unshaded
  - type: Fixtures
    fixtures:
      trap:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
          - MobMask
        layer:
          - SlipLayer
  - type: OE14MagicEnergyExaminable
  - type: OE14MagicEnergyContainer
    maxEnergy: 42
    energy: 42
    unsafeSupport: true
  - type: OE14MagicEnergyDraw
    energy: -0.5
    delay: 5
  - type: OE14MagicUnsafeDamage
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 1
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
  - type: TriggerOnCollide
    fixtureID: trap
  - type: SpawnOnTrigger
    proto: OE14ActionSpellElectricTrapEffect
  - type: DeleteOnTrigger

- type: entity
  id: OE14ActionSpellElectricTrapEffect
  name: electric star
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/Magic/cast_impact.rsi
    drawdepth: Mobs
    noRot: true
    layers:
      - state: stars
        color: "#e8ff4c"
        shader: unshaded
  - type: TimedDespawn
    lifetime: 1
  - type: Tag
    tags:
      - HideContextMenu
  - type: OE14AreaEntityEffect
    range: 2
    effects:
    - !type:OE14SpellApplyEntityEffect
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Shock: 10
      - !type:MovespeedModifier
        walkSpeedModifier: 1.3
        sprintSpeedModifier: 1.3
        statusLifetime: 4
      - !type:Jitter
      - !type:OE14StaminaChange
        staminaDelta: -100
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/PowerSink/electric.ogg
      params:
        variation: 0.1
        volume: -2
  - type: TriggerOnSpawn

- type: entity
  parent: OE14BaseSpellScrollElectric
  id: OE14SpellScrollElectricTrap
  name: electric trap spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellElectricTrap

- type: entity
  parent: OE14SpawnMagicElectricTrap
  id: OE14SpawnMagicElectricTrapInvisible
  suffix: Invisible. Permanent
  components:
  - type: Visibility
    layer: 16
  - type: OE14MagicEnergyDraw
    energy: 0
    delay: 0

- type: entity
  parent: OE14SpawnMagicElectricTrap
  id: OE14SpawnMagicElectricTrapPermanent
  suffix: Permanent
  components:
  - type: OE14MagicEnergyDraw
    energy: 0
    delay: 0

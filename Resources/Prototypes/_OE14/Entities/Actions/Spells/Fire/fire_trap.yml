- type: entity
  id: OE14ActionSpellFireTrap
  parent: OE14ActionSpellBase
  name: Armadilha de fogo
  description: Cria uma armadilha de fogo no local selecionado. Não esqueça de recarregá-la com mana.
  components:
  - type: OE14ActionIntScaledDescription
    baseDescription: Cria uma armadilha de fogo no local selecionado. Não esqueça de recarregá-la com mana.
    scaleEntries:
    - label: Dano
      baseValue: 10.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.9
  - type: OE14ActionManaCost
    manaCost: 40
  - type: OE14ActionSpeaking
    startSpeech: "Signum ignis..."
    endSpeech: "hunc locum custodi"
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneFireTrap
  - type: Action
    useDelay: 4
    icon:
      sprite: _OE14/Actions/Spells/fire.rsi
      state: fire_trap
  - type: TargetAction
    checkCanAccess: false
    range: 3
  - type: DoAfterArgs
    delay: 1
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectFireTrap
      effects:
      - !type:OE14SpellSpawnTrapEntityOnTarget
        trap: OE14SpawnMagicFireTrap

- type: entity
  id: OE14RuneFireTrap
  parent: OE14BaseMagicTrap
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#eea911"
  - type: Sprite
    layers:
    - state: small_circle
      color: "#fdda5d"
      shader: unshaded
    - state: rune_fire
      color: "#eea911"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectFireTrap
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#eea911"
      shader: unshaded

- type: entity
  id: OE14SpawnMagicFireTrap
  parent: OE14BaseMagicTrap
  name: fire trap
  description: A rune of fire drawn on the ground using magic — it's best not to step on it.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: small_circle
      color: "#fdda5d"
      shader: unshaded
    - state: rune_fire
      color: "#eea911"
      shader: unshaded
  - type: Fixtures
    fixtures:
      trap:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
          - MobMask
        layer:
          - SlipLayer
  - type: OE14MagicEnergyExaminable
  - type: OE14MagicEnergyContainer
    maxEnergy: 42
    energy: 42
    unsafeSupport: true
  - type: OE14MagicEnergyDraw
    energy: -0.5
    delay: 5
  - type: OE14MagicUnsafeDamage
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 1
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
  - type: OE14TrapCollide
    whitelist:
      components:
      - MobState
    triggerSound: !type:SoundCollectionSpecifier
      collection: ToySqueak
    effects:
    - !type:OE14SpellArea
      range: 1
      affectCaster: false
      whitelist:
        components:
        - MobState
      effects:
      - !type:OE14SpellApplyDamageScaled
        damage:
          types:
            Heat: 10
      - !type:OE14SpellApplyEntityEffect
        effects:
        - !type:AdjustTemperature
          amount: 50000
        - !type:Ignite
    - !type:OE14SpellSpawnEntityOnTarget
      spawns:
      - OE14ActionSpellFireTrapEffect

- type: entity
  id: OE14ActionSpellFireTrapEffect
  name: fire circle
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/Magic/cast_impact.rsi
    drawdepth: Mobs
    noRot: true
    layers:
      - state: circle_increase
        color: "#eea911"
        shader: unshaded
  - type: TimedDespawn
    lifetime: 1
  - type: Tag
    tags:
      - HideContextMenu
  - type: OE14AreaEntityEffect
    range: 1
    effects:
    - !type:OE14SpellApplyEntityEffect
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Heat: 10
      - !type:AdjustTemperature
        amount: 50000
      - !type:Ignite
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/fire.ogg
      params:
        variation: 0.1
        volume: -2
  - type: TriggerOnSpawn

- type: entity
  parent: OE14BaseSpellScrollFire
  id: OE14SpellScrollFireTrap
  name: fire trap spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellFireTrap

- type: entity
  parent: OE14SpawnMagicFireTrap
  id: OE14SpawnMagicFireTrapInvisible
  suffix: Invisible. Permanent. Admin
  components:
  - type: Visibility
    layer: 16
  - type: OE14MagicEnergyDraw
    energy: 0
    delay: 0

- type: entity
  parent: OE14SpawnMagicFireTrap
  id: OE14SpawnMagicFireTrapPermanent
  suffix: Permanent
  components:
  - type: OE14MagicEnergyDraw
    energy: 0
    delay: 0

- type: entity
  id: OE14ActionSpellHellBallade
  parent: OE14ActionSpellBase
  name: Hell ballade
  description: Your music is infused with the power of fire and literally burns you and your enemies up.
  components:
  - type: Sprite
    sprite: _OE14/Actions/Spells/fire.rsi
    state: fire_music
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.5
  - type: OE14ActionManaCost
    manaCost: 8
  - type: OE14ActionRequiredMusicTool
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneHellBallade
  - type: DoAfterArgs
    hidden: true
    repeat: true
    delay: 1
  - type: OE14ActionDangerous
  - type: Action
    useDelay: 15
    sound: null
    icon:
      sprite: _OE14/Actions/Spells/fire.rsi
      state: fire_music
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellArea
        range: 3
        maxTargets: 4
        whitelist:
          components:
          - MobState
        effects:
        - !type:OE14SpellSpawnEntityOnTarget
          spawns:
          - OE14ImpactEffectHellBallade
        - !type:OE14SpellApplyEntityEffect
          effects:
          - !type:Jitter
          - !type:FlammableReaction
            multiplier: 0.5
          - !type:AdjustTemperature
            amount: 500
          - !type:Ignite

- type: entity
  id: OE14ImpactEffectHellBallade
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_5
      color: "#eea911"
      shader: unshaded

- type: entity
  id: OE14RuneHellBallade
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#eea911"
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_3
      color: "#eea911"
      shader: unshaded

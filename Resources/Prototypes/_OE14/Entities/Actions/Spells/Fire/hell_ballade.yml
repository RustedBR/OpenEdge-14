- type: entity
  id: OE14ActionSpellHellBallade
  parent: OE14ActionSpellBase
  name: Balada infernal
  description: Sua música é infundida com o poder do fogo, queimando você e seus inimigos.
  components:
  - type: Sprite
    sprite: _OE14/Actions/Spells/fire.rsi
    state: fire_music
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.5
  - type: OE14ActionIntScaledDescription
    baseDescription: Sua música é infundida com o poder do fogo, queimando você e seus inimigos.
    scaleEntries:
    - label: Alcance
      baseValue: 3.0
      unit: " tiles"
      decimals: 1
      isAdditive: true
      intBonus: 0.1
    - label: Alvos
      baseValue: 4.0
      unit: ""
      decimals: 0
      isAdditive: true
      intBonus: 0.2
  - type: OE14ActionManaCost
    manaCost: 8
  - type: OE14ActionRequiredMusicTool
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneHellBallade
  - type: DoAfterArgs
    hidden: true
    repeat: true
    delay: 1
  - type: OE14ActionDangerous
  - type: Action
    useDelay: 15
    sound: null
    icon:
      sprite: _OE14/Actions/Spells/fire.rsi
      state: fire_music
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellArea
        range: 3
        maxTargets: 4
        intRangeBonus: 0.1
        intMaxTargetsBonus: 0.2
        whitelist:
          components:
          - MobState
        effects:
        - !type:OE14SpellSpawnEntityOnTarget
          spawns:
          - OE14ImpactEffectHellBallade
        - !type:OE14SpellApplyEntityEffect
          effects:
          - !type:Jitter
          - !type:FlammableReaction
            multiplier: 0.5
          - !type:AdjustTemperature
            amount: 500
          - !type:Ignite

- type: entity
  id: OE14ImpactEffectHellBallade
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_5
      color: "#eea911"
      shader: unshaded

- type: entity
  id: OE14RuneHellBallade
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#eea911"
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_3
      color: "#eea911"
      shader: unshaded

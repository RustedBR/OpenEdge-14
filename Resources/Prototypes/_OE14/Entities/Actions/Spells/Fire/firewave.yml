- type: entity
  id: OE14ActionSpellFirewave
  parent: OE14ActionSpellBase
  name: Onda de fogo
  description: Você solta uma onda de fogo que atinge múltiplos alvos em área.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.75
  - type: OE14ActionIntScaledDescription
    baseDescription: Você solta uma onda de fogo que atinge múltiplos alvos em área.
    scaleEntries:
    - label: Dano por projétil
      baseValue: 2.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 10
  - type: OE14ActionSpeaking
    endSpeech: "Ignis acus!"
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneFirebolt
  - type: OE14ActionDangerous
  - type: DoAfterArgs
    delay: 0.25
  - type: Action
    useDelay: 1
    icon:
      sprite: _OE14/Actions/Spells/fire.rsi
      state: firewave
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      effects:
      - !type:OE14SpellProjectile
        prototype: OE14Firebolt
        spread: 2
        projectileSpeed: 5
        projectileCount: 8
        scaleWithCasterInt: true

- type: entity
  id: OE14RuneFirebolt
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#eea911"
  - type: Sprite
    layers:
    - state: medium_circle
      color: "#fdda5d"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectFirebolt
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/fire.rsi
    layers:
    - state: small
      visible: false
      map: ["enum.EffectLayers.Unshaded"]
  - type: PointLight
    color: "#E25822"
    radius: 2.0
    energy: 2.0
  - type: LightFade

- type: entity
  id: OE14Firebolt
  parent: BaseBullet
  name: firebolt
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: TimedDespawn
    lifetime: 1
  - type: SpawnOnDespawn
    prototype: OE14ImpactEffectFirebolt
  - type: PointLight
    color: "#E25822"
    radius: 2.0
    energy: 2.0
  - type: Projectile
    impactEffect: OE14ImpactEffectFirebolt
    damage:
      types:
        Heat: 2
    soundHit:
      path: /Audio/Weapons/Guns/Hits/energy_metal1.ogg
  - type: Sprite
    sprite: _OE14/Effects/fire.rsi
    layers:
    - state: small
      shader: unshaded


- type: entity
  parent: OE14BaseSpellScrollFire
  id: OE14SpellScrollFirewave
  name: firewave spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellFirewave


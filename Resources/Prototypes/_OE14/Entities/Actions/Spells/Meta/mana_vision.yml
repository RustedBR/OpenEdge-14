- type: entity
  id: OE14ActionToggleMagicVision
  parent: BaseMentalAction
  name: Visão mágica
  description: Você se concentra nos fluxos mágicos para rastrear eventos recentes e escanear as marcas de aura de outros seres vivos.
  components:
  - type: Action
    useDelay: 0.5
    itemIconStyle: BigAction
    checkCanInteract: false
    checkConsciousness: true
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/rumble.ogg
    icon:
      sprite: _OE14/Actions/Spells/meta.rsi
      state: magic_vision
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
        - !type:OE14SpellToggleStatusEffect
          statusEffect: OE14MetaMagicVisionSpellStatusEffect

- type: entity
  id: OE14ManaVisionPointer
  name: pointer
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    color: "#42a4f5"
    sprite: /Textures/_OE14/Effects/Magic/pointer.rsi
    offset: 0, -1
    layers:
      - state: pointer
        shader: unshaded
    drawdepth: LowFloors
  - type: TimedDespawn
    lifetime: 2
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: OE14MagicVisionMarker
  parent: OE14SpectralBase
  categories: [ HideSpawnMenu ]
  name: mana trace
  components:
  - type: Sprite
    noRot: true
    drawdepth: Effects
    layers:
      - state: sphere
        sprite: /Textures/_OE14/Effects/Magic/pointer_sphere.rsi
        shader: unshaded
        color: "#42a4f5"
  - type: Clickable
  - type: Visibility
    layer: 16 #magic vision only

- type: entity
  id: OE14ActionSpellMagicSplitting
  parent: OE14ActionSpellBase
  name: Quebra mágica
  description: Você destrói a própria essência da magia, interrompendo conjurações e destruindo mana.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.7
  - type: OE14ActionManaCost
    manaCost: 10
  - type: DoAfterArgs
    delay: 1
    repeat: true
    breakOnMove: true
    breakOnDamage: true
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneMagicSplitting
  - type: OE14ActionIntScaledDescription
    baseDescription: Você destrói a própria essência da magia, interrompendo conjurações e destruindo mana.
    scaleEntries:
    - label: Mana destruída
      baseValue: 5.0
      unit: " mana"
      decimals: 1
  - type: Action
    useDelay: 15
    icon:
      sprite: _OE14/Actions/Spells/meta.rsi
      state: counter_spell
  - type: TargetAction
    range: 5
  - type: EntityTargetAction
    whitelist:
      components:
      - OE14MagicEnergyContainer
      - ExaminableSolution
    event: !type:OE14EntityTargetModularEffectEvent
      effects:
      - !type:OE14SpellMixSolution
        reactionTypes:
        - OE14MagicSplitting
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectMagicSplitting
      - !type:OE14SpellManaChangeScaled
        manaDelta: -5
        safe: false
        scaleWithCasterInt: true

- type: entity
  id: OE14RuneMagicSplitting
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#601fc2"
  - type: Sprite
    layers:
    - state: medium_circle
      color: "#601fc2"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectMagicSplitting
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: Effects/electricity.rsi
    layers:
    - state: electrified
      color: "#601fc2"
      shader: unshaded
  - type: PointLight
    color: "#601fc2"
    enabled: true
    radius: 2
    energy: 2
    netsync: false
  - type: LightFade
    duration: 1

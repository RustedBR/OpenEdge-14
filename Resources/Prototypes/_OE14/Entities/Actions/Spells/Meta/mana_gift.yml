- type: entity
  id: OE14ActionSpellManaGift
  parent: OE14ActionSpellBase
  name: Transferência de mana
  description: Você transfere energia mágica para um alvo ou objeto mágico.
  components:
  - type: OE14ActionManaCost
    manaCost: 10
    canModifyManacost: false
  - type: DoAfterArgs
    repeat: true
    breakOnMove: true
    delay: 1
    breakOnDamage: true
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneManaGift
  - type: OE14ActionIntScaledDescription
    baseDescription: Você transfere energia mágica para um alvo ou objeto mágico.
    scaleEntries:
    - label: Mana transferida
      baseValue: 10.0
      unit: " mana"
      decimals: 1
  - type: Action
    useDelay: 2
    icon:
      sprite: _OE14/Actions/Spells/meta.rsi
      state: mana_gift
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - OE14MagicEnergyContainer
      - OE14MagicEnergyCrystalSlot
    canTargetSelf: true
    event: !type:OE14EntityTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectManaGift
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectManaGift
      - !type:OE14SpellManaChangeScaled
        manaDelta: 10
        safe: false
        scaleWithCasterInt: true

- type: entity
  id: OE14ActionSpellManaGiftElf
  parent: OE14ActionSpellManaGift
  name: Absorção élfica
  description: Você transfere mana a uma taxa tremenda sem causar dano ao alvo. A quantidade transferida escala com Inteligência.
  components:
  - type: OE14ActionManaCost
    manaCost: 20
  - type: EntityTargetAction
    event: !type:OE14EntityTargetModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectManaGift
      - !type:OE14SpellManaChangeScaled
        manaDelta: 20
        safe: true
        scaleWithCasterInt: true

- type: entity
  id: OE14RuneManaGift
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#5096d4"
  - type: Sprite
    layers:
    - state: medium_line
      color: "#5096d4"
      shader: unshaded
    - state: double_outer
      color: "#5096d4"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectManaGift
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#5096d4"
      shader: unshaded

- type: entity
  parent: OE14BaseSpellScrollMeta
  id: OE14SpellScrollManaGift
  name: mana gift spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellManaGift


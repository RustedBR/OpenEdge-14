- type: entity
  id: OE14ActionSpellManaConsume
  parent: OE14ActionSpellBase
  name: Absorção de mana
  description: Você absorve mana do alvo.
  components:
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneManaConsume
  - type: OE14ActionIntScaledDescription
    baseDescription: Você absorve mana do alvo.
    scaleEntries:
    - label: Mana drenada
      baseValue: 10.0
      unit: " mana"
      decimals: 1
  - type: Action
    useDelay: 5
    icon:
      sprite: _OE14/Actions/Spells/meta.rsi
      state: mana_consume
  - type: DoAfterArgs
    repeat: true
    breakOnMove: true
    delay: 1
    breakOnDamage: true
  - type: TargetAction
  - type: EntityTargetAction
    whitelist:
      components:
      - OE14MagicEnergyContainer
    event: !type:OE14EntityTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectManaConsume
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectManaConsume
      - !type:OE14SpellConsumeManaEffect
        mana: 10
        scaleWithCasterInt: true

- type: entity
  id: OE14ActionSpellManaConsumeElf
  parent: OE14ActionSpellManaConsume
  name: Absorção de mana cuidadosa
  description: Você absorve mana a uma taxa tremenda sem causar dano ao portador. A quantidade drenada escala com Inteligência.
  components:
  - type: EntityTargetAction
    event: !type:OE14EntityTargetModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectManaConsume
      - !type:OE14SpellConsumeManaEffect
        safe: true
        mana: 20
        scaleWithCasterInt: true

- type: entity
  id: OE14RuneManaConsume
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#5096d4"
  - type: Sprite
    layers:
    - state: medium_line
      color: "#5096d4"
      shader: unshaded
    - state: double_outer
      color: "#5096d4"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectManaConsume
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_down
      color: "#5096d4"
      shader: unshaded


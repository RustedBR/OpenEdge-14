- type: entity
  id: OE14ActionSpellMagicBallade
  parent: OE14ActionSpellBase
  name: Balada mágica
  description: Com sua música, você infunde mana nos objetos ao redor.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.8
  - type: OE14ActionIntScaledDescription
    baseDescription: Com sua música, você infunde mana nos objetos ao redor.
    scaleEntries:
    - label: Alcance
      baseValue: 5.0
      unit: " tiles"
      decimals: 1
      isAdditive: true
      intBonus: 0.1
    - label: Alvos
      baseValue: 5.0
      unit: ""
      decimals: 0
      isAdditive: true
      intBonus: 0.2
    - label: Mana/alvo
      baseValue: 1.2
      unit: " mana"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 5
    canModifyManacost: false
  - type: DoAfterArgs
    hidden: true
    delay: 0.5
  - type: OE14ActionRequiredMusicTool
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneMagicBallade
  - type: Action
    sound: null
    useDelay: 15
    icon:
      sprite: _OE14/Actions/Spells/meta.rsi
      state: magic_music
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellArea
        range: 5
        maxTargets: 5
        intRangeBonus: 0.1
        intMaxTargetsBonus: 0.2
        whitelist:
          components:
          - OE14MagicEnergyContainer
          - OE14MagicEnergyCrystalSlot
        effects:
        - !type:OE14SpellSpawnEntityOnTarget
          spawns:
          - OE14ImpactEffectMagicBallade
        - !type:OE14SpellManaChangeScaled
          manaDelta: 1.2
          safe: true
          scaleWithCasterInt: true

- type: entity
  id: OE14ImpactEffectMagicBallade
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_5
      color: "#5096d4"
      shader: unshaded

- type: entity
  id: OE14RuneMagicBallade
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#5096d4"
  - type: Sprite
    sprite: _OE14/Effects/music.rsi
    layers:
    - state: notes_3
      color: "#5096d4"
      shader: unshaded


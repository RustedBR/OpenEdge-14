- type: entity
  id: OE14ActionSpellIceTrap
  parent: OE14ActionSpellBase
  name: Armadilha de gelo
  description: Cria uma armadilha de gelo no local selecionado. Não esqueça de recarregá-la com mana.
  components:
  - type: OE14ActionIntScaledDescription
    baseDescription: Cria uma armadilha de gelo no local selecionado. Não esqueça de recarregá-la com mana.
    scaleEntries:
    - label: Dano
      baseValue: 10.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.9
  - type: OE14ActionManaCost
    manaCost: 40
  - type: OE14ActionSpeaking
    startSpeech: "Signum glaciei..."
    endSpeech: "hunc locum custodi"
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneIceTrap
  - type: Action
    useDelay: 4
    icon:
      sprite: _OE14/Actions/Spells/water.rsi
      state: ice_trap
  - type: DoAfterArgs
    delay: 2.5
  - type: TargetAction
    checkCanAccess: false
    range: 3
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectIceTrap
      effects:
      - !type:OE14SpellSpawnTrapEntityOnTarget
        trap: OE14SpawnMagicIceTrap

- type: entity
  id: OE14RuneIceTrap
  parent: OE14BaseMagicTrap
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#eea911"
  - type: Sprite
    layers:
    - state: small_circle
      color: "#5eabeb"
      shader: unshaded
    - state: rune_ice
      color: "#5eabeb"
      shader: unshaded

- type: entity
  id: OE14ImpactEffectIceTrap
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#5eabeb"
      shader: unshaded

- type: entity
  id: OE14SpawnMagicIceTrap
  parent: OE14BaseMagicTrap
  name: ice trap
  description: A rune of ice drawn on the ground using magic — it's best not to step on it.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: small_circle
      color: "#5eabeb"
      shader: unshaded
    - state: rune_ice
      color: "#5eabeb"
      shader: unshaded
  - type: Fixtures
    fixtures:
      trap:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
          - MobMask
        layer:
          - SlipLayer
  - type: OE14MagicEnergyExaminable
  - type: OE14MagicEnergyContainer
    maxEnergy: 42
    energy: 42
    unsafeSupport: true
  - type: OE14MagicEnergyDraw
    energy: -0.5
    delay: 5
  - type: OE14MagicUnsafeDamage
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 1
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
  - type: OE14TrapCollide
    whitelist:
      components:
      - MobState
    triggerSound: !type:SoundCollectionSpecifier
      collection: ToySqueak
    effects:
    - !type:OE14SpellArea
      range: 1
      affectCaster: false
      whitelist:
        components:
        - MobState
      effects:
      - !type:OE14SpellApplyDamageScaled
        damage:
          types:
            Cold: 10
      - !type:OE14SpellApplyEntityEffect
        effects:
        - !type:MovespeedModifier
          walkSpeedModifier: 0.0
          sprintSpeedModifier: 0.0
          statusLifetime: 3
        - !type:AdjustTemperature
          amount: -50000
        - !type:ExtinguishReaction
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14WindowMagicIceBlock
    - !type:OE14SpellSpawnEntityOnTarget
      spawns:
      - OE14ActionSpellIceTrapEffect

- type: entity
  id: OE14ActionSpellIceTrapEffect
  name: ice circle
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/Magic/cast_impact.rsi
    drawdepth: Mobs
    noRot: true
    layers:
      - state: circle_decrease
        color: "#5eabeb"
        shader: unshaded
  - type: TimedDespawn
    lifetime: 1
  - type: Tag
    tags:
      - HideContextMenu
  - type: OE14AreaEntityEffect
    range: 1
    effects:
    - !type:OE14SpellApplyEntityEffect
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Cold: 10
      - !type:MovespeedModifier
        walkSpeedModifier: 0.0
        sprintSpeedModifier: 0.0
        statusLifetime: 3
      - !type:AdjustTemperature
        amount: -50000
      - !type:ExtinguishReaction
    - !type:OE14SpellSpawnEntityOnTarget
      spawns:
      - OE14WindowMagicIceBlock
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/balloon-pop.ogg
      params:
        variation: 0.1
        volume: -2
  - type: TriggerOnSpawn

- type: entity
  parent: OE14BaseSpellScrollWater
  id: OE14SpellScrollIceTrap
  name: ice trap spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellIceTrap

- type: entity
  parent: OE14SpawnMagicIceTrap
  id: OE14SpawnMagicIceTrapInvisible
  suffix: Invisible. Permanent
  components:
  - type: Visibility
    layer: 16
  - type: OE14MagicEnergyDraw
    energy: 0
    delay: 0

- type: entity
  parent: OE14SpawnMagicIceTrap
  id: OE14SpawnMagicIceTrapPermanent
  suffix: Permanent
  components:
  - type: OE14MagicEnergyDraw
    energy: 0
    delay: 0

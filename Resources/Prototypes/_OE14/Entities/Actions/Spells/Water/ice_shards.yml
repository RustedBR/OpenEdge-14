- type: entity
  id: OE14ActionSpellIceShards
  parent: OE14ActionSpellBase
  name: Fragmentos de gelo
  description: Dispara agulhas de gelo rapidamente no alvo.
  components:
  - type: Sprite
    sprite: _OE14/Actions/Spells/water.rsi
    state: ice_shards
  - type: OE14ActionIntScaledDescription
    baseDescription: Dispara agulhas de gelo rapidamente no alvo.
    scaleEntries:
    - label: Dano por agulha
      baseValue: 7.5
      unit: " HP"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 5
  - type: OE14ActionSpeaking
    endSpeech: "Glacies acus!"
  - type: OE14ActionDangerous
  - type: Action
    useDelay: 0.5
    icon:
      sprite: _OE14/Actions/Spells/water.rsi
      state: ice_shards
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      effects:
      - !type:OE14SpellProjectile
        prototype: OE14IceShard
        scaleWithCasterInt: true
      - !type:OE14SpellSpawnEntityOnUser
        spawns:
        - OE14ImpactEffectWaterCreation

- type: entity
  id: OE14RuneIceShards
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#5eabeb"
  - type: Sprite
    layers:
    - state: double_outer
      color: "#5eabeb"
      shader: unshaded

- type: entity
  id: OE14IceShard
  parent: BaseBullet
  name: ice shard
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#5eabeb"
    radius: 1.1
    energy: 1.0
  - type: Projectile
    damage:
      types:
        Cold: 5
        Piercing: 2.5
  - type: Sprite
    sprite: _OE14/Effects/Magic/ice_shard.rsi
    layers:
    - state: shard
      shader: unshaded

- type: entity
  parent: OE14BaseSpellScrollWater
  id: OE14SpellScrollIceShards
  name: ice shards spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellIceShards

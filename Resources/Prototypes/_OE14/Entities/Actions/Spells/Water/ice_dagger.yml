- type: entity
  id: OE14ActionSpellIceDagger
  parent: OE14ActionSpellBase
  name: Adaga de gelo
  description: Você forma uma adaga de gelo afiada para uso temporário.
  components:
  - type: OE14ActionIntScaledDescription
    baseDescription: Você forma uma adaga de gelo afiada para uso temporário.
    scaleEntries:
    - label: Dano
      baseValue: 10.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 25
  - type: OE14ActionSpeaking
    startSpeech: "Un pittore sulla..."
    endSpeech: "soglia della mano"
  - type: OE14ActionFreeHandsRequired
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneWaterCreation
  - type: DoAfterArgs
    delay: 0.25
  - type: Action
    useDelay: 5
    icon:
      sprite: _OE14/Actions/Spells/water.rsi
      state: ice_dagger
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectWaterCreation
      - !type:OE14SpellSpawnInHandEntity
        spawns:
        - OE14WeaponDaggerIce
        scaleWeaponDamage: true

- type: entity
  name: ice dagger
  parent: OE14BaseWeaponDagger
  id: OE14WeaponDaggerIce
  description: A sharp ice dagger, not very durable but can temporarily replace real weapons.
  components:
  - type: Sprite
    sprite: _OE14/Objects/Weapons/Melee/Dagger/ice.rsi
    state: icon
  - type: MeleeWeapon
    damage:
      types:
        Slash: 3
        Piercing: 3
        Cold: 4
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 3
        Piercing: 3
        Cold: 4
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: TimedDespawn
    lifetime: 60

- type: entity
  parent: OE14BaseSpellScrollWater
  id: OE14SpellScrollIceDagger
  name: ice dagger spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellIceDagger


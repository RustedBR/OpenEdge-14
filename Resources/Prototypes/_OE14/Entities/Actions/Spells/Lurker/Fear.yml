- type: entity
  id: OE14ActionSpellLurkerFear
  parent: OE14ActionSpellBase
  name: Primal terror
  description: You plunge the target into primal terror, robbing them of the ability to fight and speak.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.4
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneLurkerFear
  - type: Action
    useDelay: 30
    icon:
      sprite: _OE14/Actions/Spells/lurker.rsi
      state: fear
  - type: TargetAction
    range: 15
    interactOnMiss: false
  - type: DoAfterArgs
    delay: 0.5
    hidden: true
    breakOnDamage: true
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
    event: !type:OE14EntityTargetModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnUser
        spawns:
        - OE14RuneLurkerFearImpact
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectLurkerFear
      - !type:OE14SpellRevealStealthUser
      - !type:OE14SpellApplyEntityEffect
        effects:
        - !type:MovespeedModifier
          walkSpeedModifier: 0.2
          sprintSpeedModifier: 0.2
          statusLifetime: 2
        - !type:Jitter
        - !type:GenericStatusEffect
          key: Pacified
          component: Pacified
          type: Add
          time: 2

- type: entity
  id: OE14ImpactEffectLurkerFear
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _OE14/Effects/Magic/cast_impact.rsi
    layers:
    - state: particles_down
      color: "#6c5f82"
      shader: unshaded

- type: entity
  id: OE14RuneLurkerFear
  parent: OE14BaseMagicRune
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    color: "#6c5f82"
  - type: Sprite
    layers:
    - state: double_outer
      color: "#6c5f82"
      shader: unshaded

- type: entity
  id: OE14RuneLurkerFearImpact
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    color: "#6c5f82"
    radius: 3
    energy: 8
    netsync: false
  - type: Sprite
    layers:
    - state: particles_up
      color: "#6c5f82"
      shader: unshaded
  - type: LightFade
    duration: 1


- type: entity
  id: OE14ActionSpellLurkerStep
  parent: OE14ActionSpellBase
  name: Shadow step
  description: A step through the gash of reality that allows you to cover a small of distance quickly.
  components:
  - type: OE14ActionDoAfterVisuals
    proto: OE14RuneLurkerFear
  - type: DoAfterArgs
    delay: 0.5
    hidden: true
  - type: Action
    useDelay: 30
    icon:
      sprite: _OE14/Actions/Spells/lurker.rsi
      state: step
  - type: TargetAction
    checkCanAccess: false
    range: 10
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectLurkerStep
      effects:
      - !type:OE14SpellCasterTeleport
        needVision: false
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14LurkerRitualSound

- type: entity
  id: OE14ImpactEffectLurkerStep
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: wave_up
      color: "#2b2c32"

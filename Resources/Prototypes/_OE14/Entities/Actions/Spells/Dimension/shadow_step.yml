- type: entity
  id: OE14ActionSpellShadowStep
  parent: OE14ActionSpellBase
  name: Shadow step
  description: A step through the gash of reality that allows you to cover a small of distance quickly
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.8
  - type: OE14ActionManaCost
    manaCost: 20
  - type: OE14ActionDoAfterVisuals
    proto: OE14ImpactEffectShadowStep
  - type: OE14ActionFreeHandsRequired
  - type: Action
    useDelay: 30
    icon:
      sprite: _OE14/Actions/Spells/dimension.rsi
      state: shadow_step
  - type: DoAfterArgs
    breakOnHandChange: false
    breakOnMove: false
    hidden: true
    delay: 0.5
  - type: TargetAction
    range: 7
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectShadowStep
      effects:
      - !type:OE14SpellCasterTeleport

- type: entity
  id: OE14ImpactEffectShadowStep
  parent: OE14BaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: wave_up
      color: "#5e427e"

- type: entity
  parent: OE14BaseSpellScrollDimension
  id: OE14SpellScrollShadowStep
  name: shadow step spell scroll
  components:
  - type: OE14SpellStorage
    spells:
    - OE14ActionSpellShadowStep

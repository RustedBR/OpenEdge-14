- type: entity
  id: OE14ActionSpellPortalToVampireHome
  parent: OE14ActionSpellBase
  name: Teleport to the vampire lair
  description: You open a portal leading to the location of your clan's portal glyph. The portal will disappear in 30 seconds. If the glyph is not constructed, the portal will be chaotic, teleporting players in different directions.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.5
  - type: OE14ActionManaCost
    manaCost: 30
  - type: DoAfterArgs
    delay: 1
    breakOnMove: true
    breakOnDamage: true
  - type: Action
    useDelay: 60
    icon:
      sprite: _OE14/Actions/Spells/vampire.rsi
      state: portal
  - type: TargetAction
    range: 3
  - type: WorldTargetAction
    event: !type:OE14WorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:OE14SpellSpawnEntityOnTarget
        spawns:
        - OE14ImpactEffectBloodEssence
      effects:
      - !type:OE14SpellTeleportToVampireSingleton
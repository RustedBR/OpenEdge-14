- type: entity
  id: OE14ActionSpellVampirePower3
  parent: OE14ActionSpellBase
  name: Impulse
  description: Desencadeando o poder do seu clã vampírico, você repele todos ao redor por um longo tempo.
  components:
  - type: OE14ActionDoAfterSlowdown
    speedMultiplier: 0.4
  - type: OE14MagicEffectVampire
  - type: OE14ActionIntScaledDescription
    baseDescription: Desencadeando o poder do seu clã vampírico, você repele todos ao redor por um longo tempo.
    scaleEntries:
    - label: Dano por alvo
      baseValue: 10.0
      unit: " HP"
      decimals: 1
  - type: OE14ActionManaCost
    manaCost: 50
  - type: OE14ActionDangerous
  - type: Action
    useDelay: 60
    icon:
      sprite: _OE14/Actions/Spells/vampire.rsi
      state: power_kick_3
    sound: !type:SoundPathSpecifier
      path: /Audio/_OE14/Effects/essence_consume.ogg
  - type: DoAfterArgs
    delay: 0.75
  - type: InstantAction
    event: !type:OE14InstantModularEffectEvent
      effects:
      - !type:OE14SpellSpawnEntityOnUser
        spawns:
        - OE14ImpactEffectVampireKick #TODO
      - !type:OE14SpellArea
        range: 2
        maxTargets: 16
        affectCaster: false
        whitelist:
          components:
          - Body
          - Item
          - Anchorable
        effects:
        - !type:OE14SpellApplyEntityEffect
          effects:
          - !type:Paralyze
            paralyzeTime: 2
        - !type:OE14SpellThrowFromUser
          throwPower: 15
        - !type:OE14SpellSpawnEntityOnTarget
          clientside: true
          spawns:
          - OE14ImpactEffectBloodStep
        - !type:OE14SpellApplyDamageScaled
          damage:
            types:
              Blunt: 10
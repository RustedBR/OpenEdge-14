# Undead

- type: entity
  name: walking dead spawner
  id: OE14SpawnMobUndeadZombieRandom
  parent: MarkerBase
  suffix: Random
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - sprite: Markers/cross.rsi
      state: green
    - sprite: _OE14/Mobs/Species/Zombie/parts.rsi
      state: full
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - !type:GroupSelector
        weight: 60
        children:
        - id: OE14MobUndeadZombieGearEasy1
        - id: OE14MobUndeadZombieGearEasy2
        - id: OE14MobUndeadZombieGearEasy3
        - id: OE14MobUndeadZombieGearEasy4
        - id: OE14MobUndeadZombieGearEasy5


- type: entity
  id: OE14VentCritterMarker
  parent: MarkerBase
  categories: [ ForkFiltered ]
  name: Mob spawners marker
  description: random creatures breaking out of the demiplanes will spawn at this location
  components:
  - type: VentCritterSpawnLocation
  - type: Sprite
    layers:
    - state: pink
    - sprite: /Textures/_OE14/Mobs/Monster/mole.rsi
      state: live

- type: entity
  id: OE14BaseMobGroupSpawner
  categories: [ ForkFiltered, HideSpawnMenu ]
  name: pulsating demiplane rift
  description: Something from the demiplanes is bursting into your world! Look out!
  components:
  - type: Transform
    anchored: True
  - type: Clickable
  - type: Physics
    canCollide: false
    bodyType: Static
  - type: Sprite
    drawdepth: Effects
    sprite: /Textures/_OE14/Structures/Dungeon/demiplan_rift.rsi
    layers:
    - state: pulse
      shader: unshaded
      color: red
  - type: PointLight
    radius: 2
    energy: 2
    color: "#851531"
    netsync: false
  - type: AmbientSound
    volume: -3
    range: 7
    sound:
      path: /Audio/Ambience/Objects/gravity_gen_hum.ogg
  - type: TimedDespawn
    lifetime: 6
  - type: SingularityDistortion
    falloffPower: 1.5
    intensity: 50
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Effects/demon_dies.ogg
      params:
        variation: 0.3

- type: entity
  parent: OE14BaseMobGroupSpawner
  id: OE14MobGroupSpawnerZombie
  suffix: 1-3 Zombie
  components:
  - type: EntityTableSpawner
    deleteSpawnerAfterSpawn: false
    offset: 1
    table: !type:GroupSelector
      rolls: !type:RangeNumberSelector
        range: 1, 3
      children:
      - id: OE14MobUndeadZombie
        weight: 2
      - id: OE14MobUndeadZombieGearEasy1
      - id: OE14MobUndeadZombieGearEasy2
      - id: OE14MobUndeadZombieGearEasy3


- type: entity
  abstract: true
  parent: BaseObjective
  id: OE14BasePersonalObjective
  components:
  - type: Objective
    issuer: oe14-objective-issuer-personal
    difficulty: 1

- type: entity
  parent: OE14BasePersonalObjective
  abstract: true
  id: OE14BasePersonalCurrencyCollectObjective
  components:
  - type: Objective
    difficulty: 0
  - type: OE14CurrencyCollectCondition
    currency: 10
    category: Currency
    objectiveText: oe14-objective-personal-currency-collect-title
    objectiveDescription: oe14-objective-personal-currency-collect-desc
    objectiveSprite:
      sprite: /Textures/_OE14/Objects/Economy/gp_coin.rsi
      state: coin10

# Collect currency group
- type: entity
  parent: OE14BasePersonalCurrencyCollectObjective
  id: OE14PersonalCurrencyCollectObjective
  components:
  - type: Objective
    difficulty: 1
  - type: OE14CurrencyCollectCondition
    currency: 500

- type: weightedRandom
  id: OE14PersonalCurrencyCollectObjectiveGroup
  weights:
    OE14PersonalCurrencyCollectObjective: 1

# Defeat enemies objectives
- type: entity
  abstract: true
  parent: OE14BasePersonalObjective
  id: OE14BasePersonalDefeatEnemiesObjective
  components:
  - type: Objective
    difficulty: 0
  - type: OE14DefeatEnemiesCondition
    targetCount: 5
    currentCount: 0
    memoryReward: 0.5
    rewardEvery: 5
    objectiveText: oe14-objective-personal-defeat-enemies-title
    objectiveDescription: oe14-objective-personal-defeat-enemies-desc

- type: entity
  parent: OE14BasePersonalDefeatEnemiesObjective
  id: OE14PersonalDefeatEnemiesObjective
  components:
  - type: Objective
    difficulty: 1
  - type: OE14DefeatEnemiesCondition
    targetCount: 5

- type: weightedRandom
  id: OE14PersonalDefeatEnemiesObjectiveGroup
  weights:
    OE14PersonalDefeatEnemiesObjective: 1


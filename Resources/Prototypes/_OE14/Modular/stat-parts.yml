# Stat Bonus Modular Parts
# These parts add +1 to specific stats when attached to weapons/armor.
# Reutilizes crystal sprites from Alchemy for consistency across jobs.

# === STRENGTH CRYSTAL (+1 STR) ===
# Uses Fire essence shard appearance (ignis = strength)

- type: entity
  id: OE14ModularCrystalStrength
  name: Strength Essence Shard
  description: A glowing orange crystal infused with the essence of fire. When attached to a weapon, it enhances raw physical power.
  parent: BaseItem
  components:
    - type: OE14ModularCraftPart
      possibleParts:
        - OE14ModularPartStrengthCrystal
      doAfter: 1.5
      addPrice: 15
    - type: Sprite
      sprite: _OE14/Structures/Flora/Crystal/crystal_shard.rsi
      state: shard0
      color: "#d9741c"
    - type: Item
      size: Small
    - type: PhysicalComposition
      materialComposition:
        Glass: 100
    - type: StaticPrice
      price: 50

- type: modularPart
  id: OE14ModularPartStrengthCrystal
  slots:
    - OE14ModularSlotGem
  sourceEntity: OE14ModularCrystalStrength
  destroyProb: 0.3
  modifiers:
    - !type:InvalidateExamine
    - !type:AddComponents
      override: true
      components:
      - type: OE14StatBonus
        statBonuses:
          strength: 1


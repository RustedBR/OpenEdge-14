      sprite: _OE14/Objects/Weapons/Melee/Shield/shield.rsi
      state: icon
      color: "#a9a9a9"
    - type: Item
      size: Small
    - type: PhysicalComposition
      materialComposition:
        Steel: 200
    - type: StaticPrice
      price: 120

- type: modularPart
  id: OE14ModularPartArmorPlateHeavy
  slots:

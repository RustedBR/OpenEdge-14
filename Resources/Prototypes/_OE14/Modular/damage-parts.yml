# Damage/Armor/Magic Modular Parts
# These parts modify weapons and armor with damage, protection, and magical effects

# === WEAPON DAMAGE PARTS (2) ===

- type: entity
  id: OE14ModularBladeDamage
  name: Damage Blade
  description: A sharp blade component that increases weapon damage.
  parent: BaseItem
  components:
    - type: OE14ModularCraftPart
      possibleParts:
        - OE14ModularPartBladeDamage
      doAfter: 1.5
      addPrice: 25
    - type: Sprite
      sprite: _OE14/Objects/Tools/wrench.rsi
      state: icon
      color: "#ff8c00"
    - type: Item
      size: Small
    - type: PhysicalComposition
      materialComposition:
        Steel: 150
    - type: StaticPrice
      price: 100

- type: modularPart
  id: OE14ModularPartBladeDamage
  slots:
    - OE14ModularSlotModification
  sourceEntity: OE14ModularBladeDamage
  destroyProb: 0.2
  modifiers:
    - !type:InvalidateExamine
    - !type:EditMeleeWeapon
      bonusDamage:
        types:
          Slash: 2
          Piercing: 2
          Blunt: 1

- type: entity
  id: OE14ModularBladeSpeed
  name: Speed Hilt
  description: A reinforced hilt component that increases attack speed.
  parent: BaseItem
  components:
    - type: OE14ModularCraftPart
      possibleParts:
        - OE14ModularPartBladeSpeed
      doAfter: 1.5
      addPrice: 25
    - type: Sprite
      sprite: _OE14/Objects/Tools/scissors.rsi
      state: icon
    - type: Item
      size: Small
    - type: PhysicalComposition
      materialComposition:
        Steel: 100
        Wood: 50
    - type: StaticPrice
      price: 80

- type: modularPart
  id: OE14ModularPartBladeSpeed
  slots:
    - OE14ModularSlotModification
  sourceEntity: OE14ModularBladeSpeed
  destroyProb: 0.25
  modifiers:
    - !type:InvalidateExamine
    - !type:EditMeleeWeapon
      attackRateMultiplier: 1.15

# === ARMOR PROTECTION PARTS (2) ===

- type: entity
  id: OE14ModularArmorPlateHeavy
  name: Heavy Armor Plate
  description: A thick steel plate that provides excellent protection against physical damage.
  parent: BaseItem
  components:
